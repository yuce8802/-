<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            width: 0%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .btn {
            padding: 0.5rem 1rem;
            font-weight: 600;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success { background-color: #16a34a; color: white; }
        .btn-success:hover { opacity: 0.9; }
        .btn-danger { background-color: #dc2626; color: white; }
        .btn-danger:hover { opacity: 0.9; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>
<body class="font-sans">

<!-- 加载进度条 -->
<div id="progressBar" class="progress-bar"></div>

<!-- 主要内容区域 -->
<div class="container mx-auto px-4 py-8">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800">VortinT 智能收纳空间 - 后台管理</h1>
        <button onclick="openModal('add')" class="mt-4 btn btn-success flex items-center justify-center mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
            新增产品
        </button>
    </header>

    <!-- 产品网格容器 -->
    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- 产品卡片将在这里动态生成 -->
    </div>
</div>

<!-- 编辑/新增模态框 -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" class="text-2xl font-bold mb-4">新增产品</h2>
        <form id="productForm">
            <input type="hidden" id="recordId">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">标题</label>
                <input type="text" id="titleInput" class="w-full px-3 py-2 border rounded-lg" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">图片 URL</label>
                <input type="url" id="imageInput" class="w-full px-3 py-2 border rounded-lg" placeholder="https://example.com/image.jpg">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">分类</label>
                <input type="text" id="categoryInput" class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div class="flex justify-end space-x-2">
                <button type="button" onclick="closeModal()" class="btn btn-primary">取消</button>
                <button type="submit" class="btn btn-success">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ======================
    // 🔑 配置区 (已根据您提供的信息自动填充)
    // ======================
    const CFG = {
        TOKEN: "usk6WsQlH4X6ST2hQRk4vAz",
        SHEET: "dstUcVqARey53sJnMh"
    };

    let FIELD_MAPPING = {};
    let ALL_RECORDS = [];

    // ======================
    // 核心功能函数
    // ======================

    function showProgress() {
        document.getElementById('progressBar').style.width = '0%';
        setTimeout(() => {
            document.getElementById('progressBar').style.transition = 'width 1.5s linear';
            document.getElementById('progressBar').style.width = '100%';
        }, 10);
    }

    function hideProgress() {
        document.getElementById('progressBar').style.transition = 'none';
        document.getElementById('progressBar').style.width = '0%';
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg shadow-lg text-white font-medium ${
            isError ? 'bg-red-500' : 'bg-green-500'
        }`;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function getTableFields() {
        try {
            const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/fields`, {
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
            });
            const data = await response.json();
            if (data.success) {
                const fields = data.data.fields;
                FIELD_MAPPING = {
                    title: fields.find(f => f.name === '标题')?.name || '',
                    image: fields.find(f => f.name === '图片')?.name || '',
                    category: fields.find(f => f.name === '分类')?.name || ''
                };
                if (!FIELD_MAPPING.title) throw new Error('缺少必要字段');
                return true;
            } else {
                throw new Error(data.message);
            }
        } catch (error) {
            console.error('获取字段失败:', error);
            return false;
        }
    }

    async function fetchProducts() {
        const records = [];
        let pageNum = 1;
        const pageSize = 1000;
        while (true) {
            const url = new URL(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`);
            url.searchParams.append('fieldKey', 'name');
            url.searchParams.append('pageNum', pageNum);
            url.searchParams.append('pageSize', pageSize);
            const response = await fetch(url, { headers: { 'Authorization': `Bearer ${CFG.TOKEN}` } });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();
            const newRecords = data.data.records;
            if (newRecords.length === 0) break;
            records.push(...newRecords);
            if (newRecords.length < pageSize) break;
            pageNum++;
        }
        return records;
    }

    function renderProducts(products) {
        const grid = document.getElementById('productGrid');
        if (products.length === 0) {
            grid.innerHTML = '<p class="text-center text-gray-500 col-span-full">暂无产品数据</p>';
            return;
        }
        grid.innerHTML = products.map(p => {
            const imageUrl = Array.isArray(p.fields[FIELD_MAPPING.image])
                ? p.fields[FIELD_MAPPING.image][0]?.url
                : p.fields[FIELD_MAPPING.image];
            return `
            <div class="card bg-white rounded-xl shadow-md overflow-hidden">
                <img src="${imageUrl || 'https://via.placeholder.com/400x300?text=No+Image'}" 
                     alt="${p.fields[FIELD_MAPPING.title]}" 
                     class="w-full h-48 object-cover">
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-2 line-clamp-2">${p.fields[FIELD_MAPPING.title]}</h3>
                    <p class="text-gray-600 text-sm">分类: ${p.fields[FIELD_MAPPING.category] || '未分类'}</p>
                    <div class="mt-4 flex space-x-2">
                        <button onclick="openModal('edit', ${JSON.stringify(p)})" class="btn btn-primary text-xs py-1 px-2">编辑</button>
                        <button onclick="deleteRecord('${p.recordId}')" class="btn btn-danger text-xs py-1 px-2">删除</button>
                    </div>
                </div>
            </div>
        `;
        }).join('');
    }

    // --- 新增：管理功能 ---
    
    // 打开模态框
    function openModal(mode, record = null) {
        const modal = document.getElementById('productModal');
        const form = document.getElementById('productForm');
        const title = document.getElementById('modalTitle');
        
        if (mode === 'add') {
            title.textContent = '新增产品';
            form.reset();
            document.getElementById('recordId').value = '';
        } else if (mode === 'edit' && record) {
            title.textContent = '编辑产品';
            document.getElementById('recordId').value = record.recordId;
            document.getElementById('titleInput').value = record.fields[FIELD_MAPPING.title] || '';
            const imageValue = record.fields[FIELD_MAPPING.image];
            document.getElementById('imageInput').value = Array.isArray(imageValue)
                ? imageValue[0]?.url || ''
                : imageValue || '';
            document.getElementById('categoryInput').value = record.fields[FIELD_MAPPING.category] || '';
        }
        modal.style.display = 'block';
    }

    // 关闭模态框
    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
    }

    // 提交表单 (新增/更新)
    async function submitForm(event) {
        event.preventDefault();
        showProgress();
        try {
            const recordId = document.getElementById('recordId').value;
            const fields = {
                [FIELD_MAPPING.title]: document.getElementById('titleInput').value,
                [FIELD_MAPPING.image]: document.getElementById('imageInput').value,
                [FIELD_MAPPING.category]: document.getElementById('categoryInput').value
            };

            let response;
            if (recordId) {
                // 更新记录
                response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records/${recordId}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `Bearer ${CFG.TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fields, fieldKey: 'name' })
                });
            } else {
                // 新增记录
                response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${CFG.TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ records: [{ fields }], fieldKey: 'name' })
                });
            }

            if (!response.ok) throw new Error(`操作失败: ${response.status}`);
            await refreshData();
            closeModal();
            showToast(recordId ? '✅ 产品更新成功！' : '✅ 产品新增成功！');
        } catch (error) {
            console.error('提交失败:', error);
            showToast('❌ 操作失败: ' + error.message, true);
        } finally {
            hideProgress();
        }
    }

    // 删除记录
    async function deleteRecord(recordId) {
        if (!confirm('确定要删除此产品吗？此操作不可恢复。')) return;
        showProgress();
        try {
            const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records/${recordId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
            });
            if (!response.ok) throw new Error(`删除失败: ${response.status}`);
            await refreshData();
            showToast('🗑️ 产品已删除！');
        } catch (error) {
            console.error('删除失败:', error);
            showToast('❌ 删除失败: ' + error.message, true);
        } finally {
            hideProgress();
        }
    }

    // 刷新数据
    async function refreshData() {
        ALL_RECORDS = await fetchProducts();
        renderProducts(ALL_RECORDS);
    }

    // 初始化
    async function initAdmin() {
        showProgress();
        try {
            const hasFields = await getTableFields();
            if (!hasFields) throw new Error('无法获取字段信息');
            await refreshData();
        } catch (error) {
            console.error('初始化失败:', error);
            showToast('❌ 初始化失败: ' + error.message, true);
        } finally {
            hideProgress();
        }
    }

    // 绑定事件
    document.getElementById('productForm').addEventListener('submit', submitForm);
    window.onclick = function(event) {
        const modal = document.getElementById('productModal');
        if (event.target == modal) closeModal();
    };

    // 启动
    window.onload = initAdmin;
</script>

</body>
</html>
