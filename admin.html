<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="Ej676alK0IKKwuEeIfiT26VqSAoNNb8of91qB0IoljI" />
    <meta name="description" content="VortinT智能收纳空间 - 瑞航（深圳）国际家居用品有限公司专业提供创新玩具收纳解决方案，打造整洁有序的家庭环境">
    <meta name="keywords" content="玩具收纳,智能家具,儿童收纳,收纳柜,家居用品,瑞航国际,收纳解决方案">
    <meta name="author" content="瑞航（深圳）国际家居用品有限公司">
    <meta property="og:title" content="VortinT | Official Smart Space">
    <meta property="og:description" content="创新玩具收纳解决方案 - 瑞航国际家居用品">
    <meta property="og:type" content="website">
    <title>VortinT | Official Smart Space - 创新玩具收纳解决方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; line-height: 1.6; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: linear-gradient(90deg, #2563eb, #3b82f6); width: 0%; box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3); }
        .modal-show .progress-bar { width: 100%; transition: width 1.5s linear; }
        #detail-modal, #terms-modal, #privacy-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1.5rem; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 2rem; transform: scale(0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; border: 2px solid #eff6ff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .modal-show .modal-content { transform: scale(1); opacity: 1; }
        .float-btn { animation: float 3s ease-in-out infinite; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .product-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .product-image { transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .product-card:hover .product-image { transform: scale(1.1) rotate(2deg); }
        .badge-new { position: absolute; top: 12px; right: 12px; background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; z-index: 10; }
        .search-container { position: relative; max-width: 500px; margin: 0 auto 2rem; }
        .search-input { width: 100%; padding: 12px 20px 12px 45px; border: 2px solid #e0e7ff; border-radius: 50px; font-size: 14px; transition: all 0.3s; background: white; }
    </style>
</head>
<body class="bg-blue-50/20">

    <div id="splash" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center transition-opacity duration-700">
        <div class="flex flex-col items-center">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="w-24 h-24 rounded-full animate-bounce mb-5 border-[3px] border-blue-500 shadow-xl object-cover">
            <span class="text-blue-600 font-bold text-base tracking-widest uppercase animate-pulse">Loading VortinT...</span>
        </div>
    </div>

    <div id="detail-modal" onclick="closeDetail()" role="dialog" aria-modal="true">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="progress-bar" id="p-bar"></div>
            <img id="m-img" src="" class="w-full aspect-square object-cover bg-blue-50">
            <div class="p-8 text-center">
                <p id="m-cat" class="text-[10px] text-blue-500 font-black uppercase mb-1"></p> <h2 id="m-title" class="text-xl font-bold mb-2 text-slate-800 uppercase tracking-tighter"></h2>
                <div id="m-price" class="text-xl font-black text-slate-900 mb-4"></div> <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase animate-pulse inline-block">Connecting Store...</div>
            </div>
        </div>
    </div>

    <nav id="main-nav" class="fixed top-0 left-0 w-full z-[100] bg-white/95 backdrop-blur-xl border-b border-blue-100 px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" onclick="adminGate()" class="h-12 w-12 rounded-full cursor-pointer active:scale-90 transition-transform shadow-md object-cover">
            <div class="flex flex-col text-blue-900 font-black uppercase tracking-tighter leading-tight">
                <span class="text-[10px] md:text-sm">瑞航（深圳）国际家居用品有限公司</span>
                <span class="text-[6px] md:text-[9px] opacity-60">SHENZHEN RUHANG INTERNATIONAL HOUSEHOLD PRODUCTS CO., LTD.</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-28 pb-12">
        <section class="mb-10 rounded-[2.5rem] overflow-hidden shadow-2xl bg-black aspect-video relative group border-2 border-white/10">
            <video id="v-player" class="w-full h-full object-cover" autoplay muted loop playsinline></video>
            <div class="absolute bottom-6 left-8 z-10 text-white text-xl md:text-2xl font-bold drop-shadow-lg">
                <h1 id="typed"></h1>
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-blue-900/80 via-transparent to-transparent pointer-events-none"></div>
        </section>

        <div class="search-container mb-6">
            <input type="text" id="search-input" class="search-input" placeholder="Search products..." oninput="filterProducts()">
        </div>

        <div class="mb-6 flex justify-center space-x-3">
            <button onclick="filterCategory('all')" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-xs font-bold category-btn active">All</button>
            <button onclick="filterCategory('Storage')" class="px-4 py-2 bg-white text-blue-600 border-2 border-blue-200 rounded-full text-xs font-bold category-btn">Storage</button>
            <button onclick="filterCategory('ToyBox')" class="px-4 py-2 bg-white text-blue-600 border-2 border-blue-200 rounded-full text-xs font-bold category-btn">ToyBox</button>
            <button onclick="filterCategory('New')" class="px-4 py-2 bg-white text-blue-600 border-2 border-blue-200 rounded-full text-xs font-bold category-btn">New Arrivals</button>
        </div>

        <div id="p-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6"></div>
        <div id="empty-state" class="hidden text-center py-12 text-blue-400">No Products Found</div>
    </main>

    <footer class="w-full pb-16 px-4 text-center z-10 relative text-[11px] font-bold tracking-wider">
        <p class="text-blue-900/70 uppercase">Copyright © 2026 瑞航（深圳）国际家居用品有限公司</p>
        <div class="mt-8 opacity-20">网页访问人数: <span id="visitor-count">...</span></div>
    </footer>

    <div class="fixed bottom-8 right-8 z-[1500]">
        <a id="service-link" href="#" target="_blank" class="float-btn bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center border-2 border-white">
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.63 1.44h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>
    </div>

    <script>
        const CFG = { TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", SHEET: "dstUcVqARey53sJnMh", WA_PHONE: "85269517551" };
        let products = [], timer = null, clicks = 0, filteredProducts = [];
        let serviceLink = `https://wa.me/${CFG.WA_PHONE}`;
        
        async function init() {
            try {
                const vRes = await fetch(`https://api.counterapi.dev/v1/vortint_brand/homepage/up`);
                const vData = await vRes.json();
                document.getElementById('visitor-count').innerText = vData.count;

                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const { data } = await res.json();
                
                const sRec = data.records.find(r => r.fields['标题'] === 'SERVICE_LINK');
                if(sRec && sRec.fields['链接']) serviceLink = sRec.fields['链接'];
                document.getElementById('service-link').href = serviceLink;

                products = data.records.filter(r => r.fields['标题'] !== 'SERVICE_LINK').sort((a, b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                filteredProducts = [...products];
                
                const videoTarget = data.records.find(r => r.fields['视频链接']);
                if (videoTarget) document.getElementById('v-player').src = videoTarget.fields['视频链接'];
                
                render();
                new Typed('#typed', { strings: ['Toy Storage Innovation.', 'Happy Families Join Us.', 'VortinT™ Signature.'], typeSpeed: 50, backSpeed: 30, loop: true });
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 700);
            } catch (e) { console.error(e); }
        }

        // 修改点 2：渲染函数增加了分类、价格和新标签的逻辑判断
        function render() {
            const grid = document.getElementById('p-grid');
            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }
            document.getElementById('empty-state').classList.add('hidden');
            grid.innerHTML = filteredProducts.map((p, i) => {
                const f = p.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || '');
                // 模糊匹配新标签：只要后台写了“是”或者true或者有值，就显示
                const isNew = f['新标签'] && (f['新标签'].toString() === '是' || f['新标签'].toString() === 'true');
                
                return `
                <div class="product-card bg-white p-2.5 rounded-[2rem] shadow-sm cursor-pointer relative" onclick="openP(${i})">
                    ${isNew ? '<div class="badge-new">NEW</div>' : ''}
                    <div class="overflow-hidden rounded-[1.5rem] mb-3 bg-blue-50">
                        <img src="${img}" class="product-image w-full aspect-square object-cover">
                    </div>
                    <p class="text-[8px] text-blue-500 font-black px-3 uppercase tracking-widest mb-0.5">${f['分类'] || ''}</p>
                    <h3 class="text-[10px] font-black px-3 truncate text-slate-800 uppercase tracking-tighter">${f['标题'] || 'VortinT Unit'}</h3>
                    <p class="text-[9px] text-slate-900 font-black px-3 mt-1">${f['价格'] ? '$' + f['价格'] : ''}</p>
                </div>`;
            }).join('');
        }

        // 修改点 3：打开弹窗时，精准给分类和价格 ID 赋值
        function openP(i) {
            const f = filteredProducts[i].fields;
            document.getElementById('m-img').src = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];
            document.getElementById('m-title').innerText = f['标题'];
            
            // 给新加的显示位赋值
            if(document.getElementById('m-cat')) document.getElementById('m-cat').innerText = f['分类'] || '';
            if(document.getElementById('m-price')) document.getElementById('m-price').innerText = f['价格'] ? '$' + f['价格'] : '';
            
            const modal = document.getElementById('detail-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('modal-show'), 10);
            
            timer = setTimeout(() => { 
                if (modal.classList.contains('modal-show') && f['链接']) window.location.href = f['链接']; 
            }, 1500);
        }

        function closeDetail() {
            clearTimeout(timer);
            document.getElementById('detail-modal').classList.remove('modal-show');
            setTimeout(() => document.getElementById('detail-modal').style.display = 'none', 300);
        }

        function filterProducts() {
            const s = document.getElementById('search-input').value.toLowerCase();
            filteredProducts = products.filter(p => (p.fields['标题'] || '').toLowerCase().includes(s));
            render();
        }

        function filterCategory(c) {
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.replace('bg-blue-100', 'bg-white');
                b.classList.replace('text-blue-700', 'text-blue-600');
            });
            event.target.classList.add('bg-blue-100', 'text-blue-700');
            
            if (c === 'all') filteredProducts = [...products];
            else if (c === 'New') filteredProducts = products.filter(p => p.fields['新标签'] && p.fields['新标签'].toString() === '是');
            else filteredProducts = products.filter(p => p.fields['分类'] === c);
            render();
        }

        function adminGate() { if (++clicks >= 5) window.location.href = 'admin.html'; setTimeout(() => clicks = 0, 2000); }
        window.addEventListener('load', init);
    </script>
</body>
</html>
