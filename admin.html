<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #f8fafc; }
        .drag-handle { cursor: grab; color: #cbd5e1; }
    </style>
</head>
<body>
    <div id="lock-screen" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="text-center w-full max-w-xs p-6">
            <h2 class="text-2xl font-black mb-6 tracking-tighter">VortinT Admin</h2>
            <input type="password" id="passcode" placeholder="PIN" class="w-full bg-slate-100 p-5 rounded-2xl text-center font-bold text-2xl mb-4 outline-none focus:ring-4 ring-blue-50">
            <button onclick="checkPass()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg">解锁</button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="flex justify-between items-end mb-8">
            <h1 class="text-3xl font-black tracking-tighter">分类管理中心</h1>
            <button onclick="saveOrder()" id="save-order-btn" class="hidden bg-green-500 text-white px-6 py-3 rounded-xl text-xs font-black animate-bounce">保存新排序</button>
        </header>

        <div id="product-list" class="space-y-4"></div>
    </div>

    <script>
        const CFG = { TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", SHEET: "dstUcVqARey53sJnMh", PASS: "666888" };
        let db = [];

        function checkPass() { if(document.getElementById('passcode').value === CFG.PASS) { document.getElementById('lock-screen').remove(); fetchData(); } }

        async function fetchData() {
            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
            });
            const json = await res.json();
            db = json.data.records.sort((a, b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
            render();
        }

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = db.map((item, index) => {
                const f = item.fields;
                const rid = item.recordId;
                const isFirst = (index === 0);
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];

                return `
                <div class="product-item bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col md:flex-row items-center gap-4" data-id="${rid}">
                    <div class="drag-handle"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 8h16M4 16h16"></path></svg></div>
                    <img src="${img}" class="w-16 h-16 rounded-2xl object-cover border">
                    <div class="flex-grow grid grid-cols-1 md:grid-cols-3 gap-3 w-full">
                        <div><span class="text-[8px] font-black text-slate-400">商品名称</span><input id="t-${rid}" type="text" value="${f['标题'] || ''}" class="w-full bg-slate-50 p-3 rounded-xl text-xs font-bold outline-none"></div>
                        <div><span class="text-[8px] font-black text-blue-500">${isFirst?'主视频':'跳转链'}</span><input id="l-${rid}" type="text" value="${f[isFirst?'视频链接':'链接'] || ''}" class="w-full bg-slate-50 p-3 rounded-xl text-[10px] font-mono outline-none text-blue-600"></div>
                        <div><span class="text-[8px] font-black text-red-500">分类 (用逗号隔开)</span><input id="c-${rid}" type="text" value="${f['分类'] || ''}" placeholder="书架, 白色" class="w-full bg-red-50 p-3 rounded-xl text-xs font-bold outline-none text-red-600"></div>
                    </div>
                    <button onclick="updateSingle('${rid}', ${isFirst})" class="bg-slate-900 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase">同步</button>
                </div>`;
            }).join('');

            new Sortable(list, { handle: '.drag-handle', animation: 250, onEnd: () => document.getElementById('save-order-btn').classList.remove('hidden') });
        }

        async function updateSingle(rid, isFirst) {
            const fields = { "标题": document.getElementById(`t-${rid}`).value, "分类": document.getElementById(`c-${rid}`).value };
            fields[isFirst ? "视频链接" : "链接"] = document.getElementById(`l-${rid}`).value;
            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records: [{ recordId: rid, fields }] })
            });
            if((await res.json()).success) alert("✅ 同步成功");
        }

        async function saveOrder() {
            const items = document.querySelectorAll('.product-item');
            const records = Array.from(items).map((el, index) => ({ recordId: el.getAttribute('data-id'), fields: { "排序": index + 1 } }));
            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records })
            });
            if((await res.json()).success) location.reload();
        }
    </script>
</body>
</html>
