<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            width: 0%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            transition: width 0.3s ease;
        }
        .btn {
            padding: 0.5rem 1rem;
            font-weight: 600;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary { background-color: #2563eb; color: white; box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .btn-success { background-color: #16a34a; color: white; box-shadow: 0 2px 4px rgba(22, 163, 74, 0.3); }
        .btn-success:hover { background-color: #15803d; transform: translateY(-1px); }
        .btn-danger { background-color: #dc2626; color: white; box-shadow: 0 2px 4px rgba(220, 38, 38, 0.3); }
        .btn-danger:hover { background-color: #b91c1c; transform: translateY(-1px); }
        .btn-secondary { background-color: #6b7280; color: white; box-shadow: 0 2px 4px rgba(107, 114, 128, 0.3); }
        .btn-secondary:hover { background-color: #4b5563; transform: translateY(-1px); }
        
        /* 登录模态框样式 */
        .login-modal {
            display: flex;
            position: fixed;
            z-index: 1002;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s, fadeOut 0.5s 2.5s forwards;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .hidden { display: none; }
        
        /* 加载动画 */
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="font-sans">

    <!-- 登录模态框 -->
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">VortinT 管理系统</h2>
                <p class="text-gray-600 mt-1">请输入管理员密码</p>
            </div>
            <form id="loginForm">
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2 text-left">管理员密码</label>
                    <div class="relative">
                        <input type="password" id="passwordInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="输入管理员密码" required autocomplete="off">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginButton" class="btn btn-primary w-full py-3 text-lg font-medium">
                    登录系统
                </button>
                <p class="text-center text-gray-500 text-sm mt-4">© 2024 VortinT 智能收纳空间</p>
            </form>
        </div>
    </div>

    <!-- 加载进度条 -->
    <div id="progressBar" class="progress-bar hidden"></div>

    <!-- 主要内容区域 (初始隐藏) -->
    <div id="mainContent" class="hidden">
        <div class="container mx-auto px-4 py-6">
            <header class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">VortinT 智能收纳空间</h1>
                    <p class="text-gray-600 mt-1">后台管理系统</p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <a href="https://vortint.com/" target="_blank" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        返回前台
                    </a>
                    <button onclick="openModal('add')" class="btn btn-success">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                        </svg>
                        新增产品
                    </button>
                    <button onclick="logout()" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        退出登录
                    </button>
                </div>
            </header>

            <!-- 产品网格容器 -->
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
                <!-- 产品卡片将在这里动态生成 -->
            </div>

            <!-- 空状态提示 -->
            <div id="emptyState" class="hidden text-center py-12">
                <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-800 mb-2">暂无产品数据</h3>
                <p class="text-gray-600 mb-4">点击"新增产品"按钮来添加您的第一个产品</p>
                <button onclick="openModal('add')" class="btn btn-success">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    立即添加
                </button>
            </div>
        </div>
    </div>

    <!-- 编辑/新增模态框 -->
    <div id="productModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-md w-full mx-4">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-center">新增产品</h2>
            <form id="productForm">
                <input type="hidden" id="recordId">
                <div class="mb-5">
                    <label class="block text-gray-700 mb-2">产品标题 *</label>
                    <input type="text" id="titleInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="输入产品标题" required>
                    <p class="text-sm text-gray-500 mt-1">标题将显示在产品卡片上</p>
                </div>
                <div class="mb-5">
                    <label class="block text-gray-700 mb-2">图片 URL</label>
                    <input type="url" id="imageInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="https://example.com/image.jpg">
                    <p class="text-sm text-gray-500 mt-1">支持 JPG, PNG, WebP 格式</p>
                </div>
                <div class="mb-5">
                    <label class="block text-gray-700 mb-2">产品分类</label>
                    <input type="text" id="categoryInput" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="例如：收纳盒、置物架等">
                    <p class="text-sm text-gray-500 mt-1">用于产品分类展示</p>
                </div>
                <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t">
                    <button type="button" onclick="closeModal()" class="btn btn-secondary w-full sm:w-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                        取消
                    </button>
                    <button type="submit" id="saveButton" class="btn btn-success w-full sm:w-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        保存产品
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-sm w-full mx-4 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-4 text-gray-800">确认删除</h2>
            <p class="text-gray-600 mb-6">您确定要删除这个产品吗？此操作不可恢复。</p>
            <div class="flex justify-center gap-4">
                <button type="button" onclick="closeDeleteModal()" class="btn btn-secondary px-6 py-2">
                    取消
                </button>
                <button type="button" onclick="confirmDelete()" id="confirmDeleteButton" class="btn btn-danger px-6 py-2">
                    确认删除
                </button>
            </div>
        </div>
    </div>

    <script>
        // ======================
        // 🔐 安全配置
        // ======================
        const ADMIN_PASSWORD = "vortint2024"; // 默认密码，请修改为您的安全密码
        const SESSION_KEY = 'vortint_admin_session';
        const SESSION_DURATION = 24 * 60 * 60 * 1000; // 24小时

        // ======================
        // 🔑 Vika API 配置 (已更新)
        // ======================
        const CFG = { 
            TOKEN: "uskMQI3H3NfK9JWA2cWuxNu", // 您提供的新 Token
            SHEET: "dstUcVqARey53sJnMh"       // 从链接中提取的 ID
        };
        
        let FIELD_MAPPING = {};
        let ALL_RECORDS = [];
        let RECORD_TO_DELETE = null;

        // ======================
        // 会话管理
        // ======================
        function saveSession() {
            const sessionData = { 
                timestamp: Date.now(), 
                expires: Date.now() + SESSION_DURATION 
            };
            localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
            return true;
        }

        function validateSession() {
            const sessionData = localStorage.getItem(SESSION_KEY);
            if (!sessionData) return false;
            try {
                const parsed = JSON.parse(sessionData);
                const now = Date.now();
                if (now > parsed.expires) {
                    localStorage.removeItem(SESSION_KEY);
                    return false;
                }
                return true;
            } catch (e) {
                localStorage.removeItem(SESSION_KEY);
                return false;
            }
        }

        function logout() {
            localStorage.removeItem(SESSION_KEY);
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('loginModal').classList.remove('hidden');
            showToast('已安全退出系统', false);
        }

        // ======================
        // UI 工具函数
        // ======================
        function showProgress() {
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('progressBar').style.width = '0%';
            setTimeout(() => {
                document.getElementById('progressBar').style.width = '100%';
            }, 10);
        }

        function hideProgress() {
            document.getElementById('progressBar').classList.add('hidden');
            document.getElementById('progressBar').style.width = '0%';
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'bg-red-500' : 'bg-green-500'}`;
            toast.innerHTML = `
                <div class="flex items-center">
                    ${isError ? 
                        '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 0v6m0-6h6m-6 0H6" /></svg>' :
                        '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>'
                    }
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s forwards';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function showLoadingButton(button, text = '处理中...') {
            const originalText = button.innerHTML;
            button.disabled = true;
            button.innerHTML = `
                <div class="loading-spinner mr-2"></div>
                ${text}
            `;
            return () => {
                button.disabled = false;
                button.innerHTML = originalText;
            };
        }

        // ======================
        // API 交互函数
        // ======================
        async function getTableFields() {
            try {
                showProgress();
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/fields`, {
                    headers: { 
                        'Authorization': `Bearer ${CFG.TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.message || '获取字段失败');
                }
                
                const fields = data.data.fields;
                FIELD_MAPPING = {
                    title: fields.find(f => f.name === '标题')?.name || '',
                    image: fields.find(f => f.name === '图片')?.name || '',
                    category: fields.find(f => f.name === '分类')?.name || ''
                };
                
                if (!FIELD_MAPPING.title) {
                    throw new Error('维格表缺少必要字段：标题');
                }
                
                console.log('✅ 字段映射完成:', FIELD_MAPPING);
                return true;
            } catch (error) {
                console.error('获取字段失败:', error);
                showToast(`获取字段失败: ${error.message}`, true);
                return false;
            } finally {
                hideProgress();
            }
        }

        async function fetchProducts() {
            try {
                showProgress();
                const records = [];
                let pageNum = 1;
                const pageSize = 100;
                
                while (true) {
                    const url = new URL(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`);
                    url.searchParams.append('fieldKey', 'name');
                    url.searchParams.append('pageNum', pageNum);
                    url.searchParams.append('pageSize', pageSize);
                    
                    const response = await fetch(url, { 
                        headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    if (!data.success) {
                        throw new Error(data.message || '获取数据失败');
                    }
                    
                    const newRecords = data.data.records;
                    records.push(...newRecords);
                    
                    if (newRecords.length < pageSize || !data.data.hasMore) {
                        break;
                    }
                    pageNum++;
                }
                
                console.log('✅ 获取到产品数量:', records.length);
                return records;
            } catch (error) {
                console.error('获取产品失败:', error);
                showToast(`获取产品失败: ${error.message}`, true);
                return [];
            } finally {
                hideProgress();
            }
        }

        async function createRecord(fields) {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${CFG.TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        records: [{ fields }], 
                        fieldKey: 'name' 
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.message || '创建记录失败');
                }
                
                return result.data.records[0];
            } catch (error) {
                console.error('创建记录失败:', error);
                throw error;
            }
        }

        async function updateRecord(recordId, fields) {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records/${recordId}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `Bearer ${CFG.TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        fields, 
                        fieldKey: 'name' 
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.message || '更新记录失败');
                }
                
                return result.data;
            } catch (error) {
                console.error('更新记录失败:', error);
                throw error;
            }
        }

        async function deleteRecord(recordId) {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records/${recordId}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `Bearer ${CFG.TOKEN}`
                    }
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                if (!result.success) {
                    throw new Error(result.message || '删除记录失败');
                }
                
                return true;
            } catch (error) {
                console.error('删除记录失败:', error);
                throw error;
            }
        }

        // ======================
        // 业务逻辑函数
        // ======================
        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (products.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            grid.innerHTML = products.map(p => {
                const imageUrl = Array.isArray(p.fields[FIELD_MAPPING.image])
                    ? p.fields[FIELD_MAPPING.image][0]?.url || 'https://via.placeholder.com/400x300?text=No+Image'
                    : p.fields[FIELD_MAPPING.image] || 'https://via.placeholder.com/400x300?text=No+Image';
                
                return `
                <div class="card bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                    <div class="relative aspect-w-4 aspect-h-3">
                        <img src="${imageUrl}" 
                             alt="${p.fields[FIELD_MAPPING.title]}" 
                             class="w-full h-48 object-cover transition-transform duration-300 hover:scale-105"
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300?text=加载失败'">
                        ${
                            imageUrl === 'https://via.placeholder.com/400x300?text=No+Image' || 
                            imageUrl === 'https://via.placeholder.com/400x300?text=加载失败'
                            ? '<div class="absolute inset-0 bg-blue-50 flex items-center justify-center"><span class="text-blue-600 text-sm">无图片</span></div>'
                            : ''
                        }
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg mb-2 line-clamp-2 text-gray-800 hover:text-blue-600 transition-colors">
                            ${p.fields[FIELD_MAPPING.title]}
                        </h3>
                        <p class="text-gray-600 text-sm mb-3">分类: <span class="font-medium text-gray-800">${p.fields[FIELD_MAPPING.category] || '未分类'}</span></p>
                        <div class="mt-3 flex gap-2">
                            <button onclick="openModal('edit', ${JSON.stringify(p)})" 
                                    class="btn btn-primary text-xs py-1.5 px-3 flex-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                                编辑
                            </button>
                            <button onclick="openDeleteModal('${p.recordId}')" 
                                    class="btn btn-danger text-xs py-1.5 px-3 flex-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                                删除
                            </button>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        async function refreshData() {
            ALL_RECORDS = await fetchProducts();
            renderProducts(ALL_RECORDS);
        }

        // ======================
        // 模态框控制
        // ======================
        function openModal(mode, record = null) {
            const modal = document.getElementById('productModal');
            const form = document.getElementById('productForm');
            const title = document.getElementById('modalTitle');
            const recordIdInput = document.getElementById('recordId');
            
            // 重置表单
            form.reset();
            recordIdInput.value = '';
            
            if (mode === 'add') {
                title.textContent = '新增产品';
                document.getElementById('saveButton').textContent = '保存产品';
            } else if (mode === 'edit' && record) {
                title.textContent = '编辑产品';
                document.getElementById('saveButton').textContent = '更新产品';
                recordIdInput.value = record.recordId;
                document.getElementById('titleInput').value = record.fields[FIELD_MAPPING.title] || '';
                
                const imageValue = record.fields[FIELD_MAPPING.image];
                document.getElementById('imageInput').value = Array.isArray(imageValue)
                    ? (imageValue[0]?.url || '')
                    : (imageValue || '');
                
                document.getElementById('categoryInput').value = record.fields[FIELD_MAPPING.category] || '';
            }
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function openDeleteModal(recordId) {
            RECORD_TO_DELETE = recordId;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDeleteModal() {
            RECORD_TO_DELETE = null;
            document.getElementById('deleteModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        async function confirmDelete() {
            if (!RECORD_TO_DELETE) return;
            
            const restoreButton = showLoadingButton(document.getElementById('confirmDeleteButton'), '删除中...');
            try {
                await deleteRecord(RECORD_TO_DELETE);
                await refreshData();
                closeDeleteModal();
                showToast('✅ 产品删除成功！', false);
            } catch (error) {
                showToast(`❌ 删除失败: ${error.message}`, true);
            } finally {
                restoreButton();
            }
        }

        // ======================
        // 表单提交处理
        // ======================
        async function submitForm(event) {
            event.preventDefault();
            const saveButton = document.getElementById('saveButton');
            const restoreButton = showLoadingButton(saveButton, '保存中...');
            
            try {
                const recordId = document.getElementById('recordId').value;
                const fields = {
                    [FIELD_MAPPING.title]: document.getElementById('titleInput').value,
                    [FIELD_MAPPING.image]: document.getElementById('imageInput').value,
                    [FIELD_MAPPING.category]: document.getElementById('categoryInput').value
                };
                
                if (recordId) {
                    // 更新记录
                    await updateRecord(recordId, fields);
                    showToast('✅ 产品更新成功！', false);
                } else {
                    // 创建记录
                    await createRecord(fields);
                    showToast('✅ 产品创建成功！', false);
                }
                
                await refreshData();
                closeModal();
            } catch (error) {
                showToast(`❌ 操作失败: ${error.message}`, true);
                console.error('表单提交失败:', error);
            } finally {
                restoreButton();
            }
        }

        // ======================
        // 初始化系统
        // ======================
        async function initializeSystem() {
            try {
                // 验证会话
                if (!validateSession()) {
                    document.getElementById('loginModal').classList.remove('hidden');
                    return;
                }
                
                // 显示主内容
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('loginModal').classList.add('hidden');
                
                // 初始化系统
                showProgress();
                
                // 获取字段映射
                const hasFields = await getTableFields();
                if (!hasFields) {
                    throw new Error('无法获取字段信息，请检查API配置');
                }
                
                // 加载产品数据
                await refreshData();
                
                showToast('系统初始化成功！', false);
            } catch (error) {
                console.error('系统初始化失败:', error);
                showToast(`初始化失败: ${error.message}`, true);
            } finally {
                hideProgress();
            }
        }

        // ======================
        // 事件监听器
        // ======================
        document.addEventListener('DOMContentLoaded', function() {
            // 登录表单
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const passwordInput = document.getElementById('passwordInput');
                const loginButton = document.getElementById('loginButton');
                const restoreButton = showLoadingButton(loginButton, '验证中...');
                
                setTimeout(() => {
                    if (passwordInput.value === ADMIN_PASSWORD) {
                        saveSession();
                        initializeSystem();
                    } else {
                        showToast('❌ 密码错误，请重试！', true);
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                    restoreButton();
                }, 800);
            });
            
            // 密码显示切换
            document.getElementById('togglePassword').addEventListener('click', function() {
                const passwordInput = document.getElementById('passwordInput');
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.querySelector('svg').classList.toggle('hidden');
            });
            
            // 产品表单提交
            document.getElementById('productForm').addEventListener('submit', submitForm);
            
            // 模态框关闭
            document.getElementById('productModal').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeModal();
                }
            });
            document.getElementById('deleteModal').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeDeleteModal();
                }
            });
            
            // 按ESC键关闭模态框
            window.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    closeModal();
                    closeDeleteModal();
                }
            });
            
            // 初始化系统
            initializeSystem();
        });
    </script>

</body>
</html>
