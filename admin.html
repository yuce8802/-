<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT 后台管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #0f172a; 
            overflow-x: hidden;
        }
        .sidebar {
            transition: all 0.3s ease;
        }
        .sidebar-collapsed {
            width: 80px;
        }
        .sidebar-expanded {
            width: 260px;
        }
        .content-area {
            transition: margin-left 0.3s ease;
        }
        .card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
        .status-badge {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .sortable {
            cursor: grab;
        }
        .sortable:active {
            cursor: grabbing;
        }
        .dragging {
            opacity: 0.7;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- 主容器 -->
    <div class="flex h-screen">
        
        <!-- 侧边栏 -->
        <aside id="sidebar" class="sidebar sidebar-expanded bg-white h-full shadow-2xl fixed left-0 top-0 z-50">
            <div class="p-6 border-b border-purple-100">
                <div class="flex items-center space-x-3">
                    <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                         class="h-10 w-10 rounded-full border-2 border-purple-500 object-cover">
                    <div class="sidebar-text">
                        <h1 class="text-xl font-bold text-purple-700">VortinT Admin</h1>
                        <p class="text-xs text-purple-600 mt-1">管理中心</p>
                    </div>
                </div>
            </div>
            
            <nav class="mt-6 px-4">
                <div class="space-y-2">
                    <button onclick="showSection('dashboard')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-purple-50 text-purple-700 font-bold sidebar-text">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                        </svg>
                        <span>仪表盘</span>
                    </button>
                    
                    <button onclick="showSection('products')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-purple-50 hover:text-purple-700 font-bold sidebar-text">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                        <span>产品管理</span>
                    </button>
                    
                    <button onclick="showSection('categories')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-purple-50 hover:text-purple-700 font-bold sidebar-text">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        <span>分类管理</span>
                    </button>
                    
                    <button onclick="showSection('settings')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-purple-50 hover:text-purple-700 font-bold sidebar-text">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span>系统设置</span>
                    </button>
                    
                    <button onclick="logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-red-50 hover:text-red-700 font-bold sidebar-text mt-6">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        <span>退出登录</span>
                    </button>
                </div>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="content-area flex-1 ml-64 bg-gray-50 overflow-y-auto">
            
            <!-- 顶部导航 -->
            <header class="bg-white shadow-sm sticky top-0 z-40">
                <div class="px-8 py-4 flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <button onclick="toggleSidebar()" class="p-2 hover:bg-purple-50 rounded-lg">
                            <svg class="w-6 h-6 text-purple-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                        </button>
                        <h2 id="page-title" class="text-2xl font-bold text-purple-800">仪表盘</h2>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-2 bg-purple-50 px-4 py-2 rounded-lg">
                            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                            <span class="text-sm font-bold text-purple-700">在线</span>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-bold text-purple-700">管理员</p>
                            <p class="text-xs text-purple-600">admin@vortint.com</p>
                        </div>
                        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                             class="h-10 w-10 rounded-full border-2 border-purple-500 object-cover">
                    </div>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="p-8">
                
                <!-- 仪表盘 -->
                <section id="dashboard-section" class="space-y-6">
                    <!-- 统计卡片 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="card bg-white p-6 rounded-2xl">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-purple-600 font-bold">产品总数</p>
                                    <p id="total-products" class="text-3xl font-bold text-purple-700 mt-2">0</p>
                                </div>
                                <div class="bg-purple-100 p-3 rounded-xl">
                                    <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card bg-white p-6 rounded-2xl">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-purple-600 font-bold">分类数量</p>
                                    <p id="total-categories" class="text-3xl font-bold text-purple-700 mt-2">0</p>
                                </div>
                                <div class="bg-purple-100 p-3 rounded-xl">
                                    <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card bg-white p-6 rounded-2xl">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-purple-600 font-bold">新品数量</p>
                                    <p id="total-new" class="text-3xl font-bold text-purple-700 mt-2">0</p>
                                </div>
                                <div class="bg-purple-100 p-3 rounded-xl">
                                    <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card bg-white p-6 rounded-2xl">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-purple-600 font-bold">网站访问</p>
                                    <p id="total-visits" class="text-3xl font-bold text-purple-700 mt-2">0</p>
                                </div>
                                <div class="bg-purple-100 p-3 rounded-xl">
                                    <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 快捷操作 -->
                    <div class="card bg-gradient-to-r from-purple-600 to-indigo-700 p-8 rounded-2xl text-white">
                        <h3 class="text-xl font-bold mb-4">快速操作</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <button onclick="showAddProductModal()" class="bg-white/20 backdrop-blur-sm p-4 rounded-xl hover:bg-white/30 transition-colors text-center">
                                <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                                </svg>
                                <p class="font-bold">添加产品</p>
                            </button>
                            <button onclick="showAddCategoryModal()" class="bg-white/20 backdrop-blur-sm p-4 rounded-xl hover:bg-white/30 transition-colors text-center">
                                <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                                <p class="font-bold">添加分类</p>
                            </button>
                            <button onclick="refreshData()" class="bg-white/20 backdrop-blur-sm p-4 rounded-xl hover:bg-white/30 transition-colors text-center">
                                <svg class="w-8 h-8 mx-auto mb-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                </svg>
                                <p class="font-bold">刷新数据</p>
                            </button>
                            <button onclick="showSettings()" class="bg-white/20 backdrop-blur-sm p-4 rounded-xl hover:bg-white/30 transition-colors text-center">
                                <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                                <p class="font-bold">系统设置</p>
                            </button>
                        </div>
                    </div>

                    <!-- 最近产品 -->
                    <div class="card bg-white p-6 rounded-2xl">
                        <h3 class="text-xl font-bold text-purple-800 mb-4">最近添加的产品</h3>
                        <div id="recent-products" class="space-y-3">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </section>

                <!-- 产品管理 -->
                <section id="products-section" class="hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-bold text-purple-800">产品管理</h3>
                        <button onclick="showAddProductModal()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700 transition-colors flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                            <span>添加产品</span>
                        </button>
                    </div>

                    <!-- 产品列表 -->
                    <div class="card bg-white p-6 rounded-2xl">
                        <div class="mb-6">
                            <input type="text" id="product-search" placeholder="搜索产品..." class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent" oninput="filterProductList()">
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="bg-purple-50">
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">排序</th>
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">图片</th>
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">产品名称</th>
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">分类</th>
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">价格</th>
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">新品</th>
                                        <th class="px-6 py-4 text-left text-sm font-bold text-purple-700">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="products-table-body">
                                    <!-- 动态加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <!-- 分类管理 -->
                <section id="categories-section" class="hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-bold text-purple-800">分类管理</h3>
                        <button onclick="showAddCategoryModal()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700 transition-colors flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                            <span>添加分类</span>
                        </button>
                    </div>

                    <!-- 分类列表 -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="categories-grid">
                        <!-- 动态加载 -->
                    </div>
                </section>

                <!-- 系统设置 -->
                <section id="settings-section" class="hidden space-y-6">
                    <h3 class="text-2xl font-bold text-purple-800">系统设置</h3>
                    
                    <div class="card bg-white p-6 rounded-2xl">
                        <h4 class="text-lg font-bold text-purple-700 mb-4">API配置</h4>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-purple-700 mb-2">API Token</label>
                                <input type="password" id="api-token" value="usk6WsQlH4X6ST2hQRk4vAz" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-purple-700 mb-2">数据表ID</label>
                                <input type="text" id="datasheet-id" value="dstUcVqARey53sJnMh" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-purple-700 mb-2">WhatsApp号码</label>
                                <input type="text" id="wa-phone" value="85269517551" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <button onclick="saveSettings()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700 transition-colors">
                                保存设置
                            </button>
                        </div>
                    </div>

                    <div class="card bg-white p-6 rounded-2xl">
                        <h4 class="text-lg font-bold text-purple-700 mb-4">管理员密码</h4>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-bold text-purple-700 mb-2">当前密码</label>
                                <input type="password" id="current-password" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-purple-700 mb-2">新密码</label>
                                <input type="password" id="new-password" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-purple-700 mb-2">确认新密码</label>
                                <input type="password" id="confirm-password" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            </div>
                            <button onclick="changePassword()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-700 transition-colors">
                                修改密码
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- 添加产品模态框 -->
    <div id="add-product-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl p-8 max-w-2xl w-full mx-4">
            <h3 class="text-2xl font-bold text-purple-800 mb-6">添加/编辑产品</h3>
            
            <div class="space-y-4">
                <input type="hidden" id="product-id">
                
                <div>
                    <label class="block text-sm font-bold text-purple-700 mb-2">产品名称 *</label>
                    <input type="text" id="product-title" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="请输入产品名称">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-purple-700 mb-2">产品图片 URL *</label>
                    <input type="url" id="product-image" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="请输入图片URL">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-purple-700 mb-2">分类 *</label>
                        <select id="product-category" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="">选择分类</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-purple-700 mb-2">价格</label>
                        <input type="text" id="product-price" class="w-full px-4 py-3 border border-purple-200 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="例如: ¥299">
                    </div>
                </div>

                    method = 'POST';

                        'Content-Type': 'application/json'

                    body: JSON.stringify({ records: [record] })

        // 初始化拖拽排序
        function initDragSort() {
            const rows = document.querySelectorAll('.sortable');
            let draggedItem = null;
            
            rows.forEach(row => {
                row.draggable = true;
                
                row.addEventListener('dragstart', () => {
                    draggedItem = row;
                    setTimeout(() => row.classList.add('dragging'), 0);
                });
                
                row.addEventListener('dragend', () => {
                    draggedItem = null;
                    row.classList.remove('dragging');
                });
                
                row.addEventListener('dragover', e => {
                    e.preventDefault();
                    const afterElement = getDragAfterElement(rows, e.clientY);
                    if (afterElement == null) {
                        row.parentElement.appendChild(draggedItem);
                    } else {
                        row.parentElement.insertBefore(draggedItem, afterElement);
                    }
                });
            });
        }

        function getDragAfterElement(elements, y) {
            return [...elements].reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

                return;
            }
            
            // 这里应该调用后端API验证和修改密码
            // 暂时只做前端验证
            Swal.fire('成功', '密码已修改', 'success');
            
            document.getElementById('current-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('vortint_admin_logged_in');
            window.location.href = 'login.html';
        }

        // 显示设置
        function showSettings() {
            showSection('settings');
        }

        // 页面加载
        window.addEventListener('load', init);
    </script>
</body>
</html>
