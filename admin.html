<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | 规格分类管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', 'PingFang SC', sans-serif; background: #f8fafc; }
        .drag-handle { cursor: grab; padding: 10px; color: #cbd5e1; }
        /* 默认样式 */
        .option-btn { @apply px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold text-slate-500 transition-all bg-white; }
        /* 选中状态：蓝色背景 */
        .option-btn.active { @apply bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-100; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center">
        <div class="text-center w-full max-w-xs p-6">
            <h2 class="text-2xl font-black mb-6 tracking-tighter">VortinT Admin</h2>
            <input type="password" id="passcode" placeholder="PIN" class="w-full bg-slate-50 border-none p-5 rounded-2xl text-center font-bold text-2xl mb-4 outline-none focus:ring-4 ring-blue-50">
            <button onclick="checkPass()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black active:scale-95 transition-all">确认解锁</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">规格快捷分类</h1>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mt-2">点击选项可多选分类（再次点击取消）</p>
            </div>
            <button onclick="saveOrder()" id="save-order-btn" class="hidden bg-green-500 text-white px-8 py-4 rounded-2xl text-xs font-black uppercase shadow-lg shadow-green-100 animate-bounce">保存布局排序</button>
        </header>

        <div id="product-list" class="space-y-4">
            <div class="text-center py-20 text-slate-300 font-bold animate-pulse">正在同步云端数据...</div>
        </div>
    </div>

    <script>
        const CFG = { 
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", 
            SHEET: "dstUcVqARey53sJnMh", 
            PASS: "666888" 
        };

        const PRESETS = {
            "毛绒": ["带毛绒收纳区", "不带毛绒收纳区"],
            "书架": ["带书架", "不带书架"],
            "画板": ["带画板", "不带画板"],
            "颜色": ["白色", "粉色", "蓝色", "原木色"]
        };

        let db = [];

        function checkPass() {
            if(document.getElementById('passcode').value === CFG.PASS) {
                document.getElementById('lock-screen').style.display = 'none';
                fetchData();
            } else { alert("验证码错误"); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const json = await res.json();
                if(json.success) {
                    db = json.data.records.sort((a, b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                    render();
                }
            } catch (e) { alert("网络异常"); }
        }

        // --- 核心改动：支持多选的分类逻辑 ---
        function toggleTag(rid, val, btn) {
            const input = document.getElementById(`c-${rid}`);
            let currentTags = input.value ? input.value.split(',').map(t => t.trim()) : [];
            
            if (currentTags.includes(val)) {
                // 如果已经有了，就删掉（反选）
                currentTags = currentTags.filter(t => t !== val);
                btn.classList.remove('active');
            } else {
                // 如果没有，就加上
                currentTags.push(val);
                btn.classList.add('active');
            }
            input.value = currentTags.join(', '); // 用逗号隔开
        }

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = db.map((item, index) => {
                const f = item.fields;
                const rid = item.recordId;
                const isFirst = (index === 0);
                const currentTags = f['分类'] ? f['分类'].split(',').map(t => t.trim()) : [];

                let presetHtml = "";
                for(let group in PRESETS) {
                    presetHtml += `
                        <div class="flex flex-wrap gap-1 items-center">
                            <span class="text-[9px] font-bold text-slate-300 uppercase mr-1 w-8">${group}:</span>
                            ${PRESETS[group].map(opt => {
                                const isActive = currentTags.includes(opt) ? 'active' : '';
                                return `<button onclick="toggleTag('${rid}', '${opt}', this)" class="option-btn ${isActive}">${opt}</button>`;
                            }).join('')}
                        </div>
                    `;
                }

                return `
                <div class="product-item bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col xl:flex-row items-center gap-6" data-id="${rid}">
                    <div class="drag-handle text-slate-200 hover:text-blue-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16"></path></svg>
                    </div>

                    <img src="${f['图片'] || ''}" class="w-16 h-16 rounded-2xl object-cover bg-slate-50">

                    <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                        <div>
                            <span class="text-[8px] font-black text-slate-300 uppercase ml-1">商品名称</span>
                            <input id="t-${rid}" type="text" value="${f['标题'] || ''}" class="w-full bg-slate-50 border-none p-3 rounded-xl text-xs font-bold outline-none">
                        </div>
                        <div>
                            <span class="text-[8px] font-black text-blue-500 uppercase ml-1">${isFirst ? '视频链接' : '亚马逊跳转链接'}</span>
                            <input id="l-${rid}" type="text" value="${f[isFirst ? '视频链接' : '链接'] || ''}" class="w-full bg-slate-50 border-none p-3 rounded-xl text-[10px] font-mono text-blue-600 outline-none">
                        </div>
                        <div class="md:col-span-2 space-y-2 pt-2 border-t border-slate-50">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-[8px] font-black text-red-400 uppercase">当前分类组合:</span>
                                <input id="c-${rid}" type="text" value="${f['分类'] || ''}" class="bg-red-50 text-red-600 px-3 py-1 rounded-lg text-xs font-black outline-none flex-grow">
                            </div>
                            ${presetHtml}
                        </div>
                    </div>

                    <button onclick="updateSingle('${rid}', ${isFirst})" class="w-full xl:w-auto bg-slate-900 text-white px-8 py-5 rounded-3xl text-[10px] font-black uppercase active:scale-95 transition-all">保存并同步</button>
                </div>
                `;
            }).join('');

            new Sortable(list, {
                handle: '.drag-handle',
                animation: 250,
                onEnd: () => document.getElementById('save-order-btn').classList.remove('hidden')
            });
        }

        async function updateSingle(rid, isFirst) {
            const fields = {
                "标题": document.getElementById(`t-${rid}`).value,
                "分类": document.getElementById(`c-${rid}`).value
            };
            fields[isFirst ? "视频链接" : "链接"] = document.getElementById(`l-${rid}`).value;

            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records: [{ recordId: rid, fields }] })
            });
            if((await res.json()).success) { alert("✅ 数据已云同步"); }
        }

        async function saveOrder() {
            const items = document.querySelectorAll('.product-item');
            const records = Array.from(items).map((el, index) => ({
                recordId: el.getAttribute('data-id'),
                fields: { "排序": index + 1 }
            }));
            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records })
            });
            if((await res.json()).success) { location.reload(); }
        }
    </script>
</body>
</html>
