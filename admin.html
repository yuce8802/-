<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT 后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            width: 0%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body class="font-sans">

<!-- 加载进度条 -->
<div id="progressBar" class="progress-bar"></div>

<!-- 主要内容区域 -->
<div class="container mx-auto px-4 py-8">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800">VortinT 智能收纳空间 - 后台管理</h1>
        <button onclick="initAdmin()" class="mt-4 btn-primary flex items-center justify-center mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            同步数据
        </button>
    </header>

    <!-- 产品网格容器 -->
    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- 产品卡片将在这里动态生成 -->
    </div>
</div>

<script>
    // ======================
    // 🔑 配置区 (已根据您提供的信息自动填充)
    // ======================
    const CFG = {
        TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", // 来自 index-2.html
        SHEET: "dstUcVqARey53sJnMh"       // 来自 index-2.html
    };

    // 全局变量，用于存储从API获取的真实字段名
    let FIELD_MAPPING = {};

    // ======================
    // 核心功能函数
    // ======================

    // 显示加载进度
    function showProgress() {
        document.getElementById('progressBar').style.width = '0%';
        setTimeout(() => {
            document.getElementById('progressBar').style.transition = 'width 1.5s linear';
            document.getElementById('progressBar').style.width = '100%';
        }, 10);
    }

    // 隐藏加载进度
    function hideProgress() {
        document.getElementById('progressBar').style.transition = 'none';
        document.getElementById('progressBar').style.width = '0%';
    }

    // 显示提示信息
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg shadow-lg text-white font-medium ${
            isError ? 'bg-red-500' : 'bg-green-500'
        }`;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // 获取数据表的真实字段列表
    async function getTableFields() {
        try {
            const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/fields`, {
                headers: {
                    'Authorization': `Bearer ${CFG.TOKEN}`
                }
            });
            
            const data = await response.json();
            if (data.success) {
                const fields = data.data.fields;
                console.log('🔍 获取到的数据表字段:', fields);

                // 根据您前端 index-2.html 中使用的字段名进行精确匹配
                // 假设您的维格表字段名为 '标题', '图片', '分类'
                FIELD_MAPPING = {
                    title: fields.find(f => f.name === '标题')?.name || '',
                    image: fields.find(f => f.name === '图片')?.name || '',
                    category: fields.find(f => f.name === '分类')?.name || ''
                };
                
                // 验证关键字段是否存在
                if (!FIELD_MAPPING.title || !FIELD_MAPPING.image) {
                    throw new Error('维格表中缺少必要的字段（标题/图片）。请检查字段名称是否完全匹配。');
                }

                console.log('✅ 字段映射成功:', FIELD_MAPPING);
                return true;
            } else {
                throw new Error(data.message || '获取字段失败');
            }
        } catch (error) {
            console.error('❌ 获取字段列表失败:', error);
            return false;
        }
    }

    // 从Vika获取所有产品数据
    async function fetchProducts() {
        const records = [];
        let pageNum = 1;
        const pageSize = 1000;

        while (true) {
            const url = new URL(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`);
            url.searchParams.append('fieldKey', 'name'); // 使用字段名进行查询
            url.searchParams.append('pageNum', pageNum);
            url.searchParams.append('pageSize', pageSize);

            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            const newRecords = data.data.records;
            
            if (newRecords.length === 0) break;
            
            records.push(...newRecords);
            
            if (newRecords.length < pageSize) break;
            pageNum++;
        }

        return records;
    }

    // 渲染产品到页面
    function renderProducts(products) {
        const grid = document.getElementById('productGrid');
        if (products.length === 0) {
            grid.innerHTML = '<p class="text-center text-gray-500 col-span-full">暂无产品数据</p>';
            return;
        }

        grid.innerHTML = products.map(p => `
            <div class="card bg-white rounded-xl shadow-md overflow-hidden">
                <img src="${Array.isArray(p.fields[FIELD_MAPPING.image]) 
                    ? p.fields[FIELD_MAPPING.image][0]?.url 
                    : p.fields[FIELD_MAPPING.image] || 'https://via.placeholder.com/400x300?text=No+Image'}" 
                     alt="${p.fields[FIELD_MAPPING.title]}" 
                     class="w-full h-48 object-cover">
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-2 line-clamp-2">${p.fields[FIELD_MAPPING.title]}</h3>
                    <p class="text-gray-600 text-sm">分类: ${p.fields[FIELD_MAPPING.category] || '未分类'}</p>
                </div>
            </div>
        `).join('');
    }

    // 初始化后台
    async function initAdmin() {
        showProgress();
        
        try {
            // 第一步：获取并确认字段名
            const hasFields = await getTableFields();
            if (!hasFields) {
                throw new Error('无法获取数据表字段信息，请检查Token和Sheet ID。');
            }

            // 第二步：获取产品数据
            const products = await fetchProducts();
            
            // 第三步：渲染到页面
            renderProducts(products);
            
            hideProgress();
            showToast(`✅ 成功同步 ${products.length} 条产品数据！`);
        } catch (error) {
            hideProgress();
            console.error('初始化失败:', error);
            showToast('❌ 同步失败: ' + error.message, true);
        }
    }

    // 页面加载完成后自动初始化
    window.onload = () => {
        // 为了演示，首次加载时不自动同步，点击按钮再同步
        // 如果您希望自动同步，可以取消注释下一行
        // initAdmin();
    };
</script>

</body>
</html>
