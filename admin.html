<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | 导航分类管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', 'PingFang SC', sans-serif; background: #f8fafc; color: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .drag-handle { cursor: grab; }
        .sortable-ghost { opacity: 0.2; background: #3b82f6 !important; }
        #lock-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        input:focus { border-color: #3b82f6 !important; background: white !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="text-center p-10 max-w-sm w-full">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-widest text-slate-800">VortinT Admin</h2>
            <input type="password" id="passcode" placeholder="输入访问代码" class="w-full bg-slate-50 border-none p-5 rounded-3xl text-center font-bold text-2xl mb-6 outline-none focus:ring-4 ring-blue-500/10">
            <button onclick="checkPass()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-lg active:scale-95 transition-all">解锁进入</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">分类与导航管理</h1>
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em] mt-2">支持：毛绒区 / 书架 / 画板 / 颜色 分类</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="saveOrder()" id="save-order-btn" class="hidden bg-green-500 text-white px-8 py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-green-100">保存当前拖拽排序</button>
                <button onclick="location.reload()" class="bg-white border border-slate-200 px-6 py-4 rounded-2xl text-xs font-bold uppercase hover:bg-slate-50">同步数据</button>
            </div>
        </header>

        <div class="mb-10">
            <p class="text-[9px] font-black text-slate-400 uppercase mb-3 ml-1 tracking-widest">当前导航预览：</p>
            <div id="category-nav" class="flex flex-wrap gap-2 no-scrollbar">
                </div>
        </div>

        <div id="product-list" class="space-y-4">
            <div class="text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-slate-100 text-slate-300 font-bold uppercase tracking-widest">加载布局中...</div>
        </div>
    </div>

    <script>
        const CFG = { 
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", 
            SHEET: "dstUcVqARey53sJnMh", 
            PASS: "666888" 
        };

        let db = [];
        let currentCat = '全部';

        function checkPass() {
            if(document.getElementById('passcode').value === CFG.PASS) {
                document.getElementById('lock-screen').style.display = 'none';
                fetchData();
            } else { alert("代码错误"); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const json = await res.json();
                if(json.success) {
                    db = json.data.records.sort((a, b) => (parseFloat(a.fields['排序']) || 999) - (parseFloat(b.fields['排序']) || 999));
                    renderUI();
                }
            } catch (e) { alert("同步失败"); }
        }

        function renderUI() {
            // 提取所有不重复的分类
            const cats = ['全部', ...new Set(db.map(item => item.fields['分类']).filter(Boolean))];
            
            // 渲染导航按钮
            document.getElementById('category-nav').innerHTML = cats.map(c => `
                <button onclick="filterCat('${c}')" class="px-6 py-3 rounded-2xl text-xs font-black uppercase transition-all ${currentCat === c ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white text-slate-400 border border-slate-100 hover:border-blue-200'}">
                    ${c}
                </button>
            `).join('');

            renderList();
        }

        function filterCat(c) {
            currentCat = c;
            renderUI();
        }

        function renderList() {
            const list = document.getElementById('product-list');
            const data = currentCat === '全部' ? db : db.filter(item => item.fields['分类'] === currentCat);

            list.innerHTML = data.map((item, index) => {
                const f = item.fields;
                const isVideo = (index === 0 && currentCat === '全部');
                
                return `
                <div class="product-item bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col lg:flex-row items-center gap-6" data-id="${item.recordId}">
                    <div class="drag-handle text-slate-200 hover:text-blue-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16"></path></svg>
                    </div>

                    <img src="${f['图片'] || ''}" class="w-20 h-20 rounded-2xl object-cover bg-slate-50">

                    <div class="flex-grow grid grid-cols-1 md:grid-cols-4 gap-4 w-full">
                        <div>
                            <span class="text-[8px] font-black text-blue-500 uppercase ml-1">分类管理</span>
                            <input id="c-${item.recordId}" type="text" value="${f['分类'] || ''}" placeholder="如：带书架" class="w-full bg-slate-50 border border-transparent p-3 rounded-xl text-xs font-bold outline-none transition-all">
                        </div>
                        <div class="md:col-span-1">
                            <span class="text-[8px] font-black text-slate-300 uppercase ml-1">标题</span>
                            <input id="t-${item.recordId}" type="text" value="${f['标题'] || ''}" class="w-full bg-slate-50 border border-transparent p-3 rounded-xl text-xs font-bold outline-none transition-all">
                        </div>
                        <div class="md:col-span-2">
                            <span class="text-[8px] font-black text-slate-300 uppercase ml-1">${isVideo ? '首屏视频链接' : '亚马逊链接'}</span>
                            <input id="l-${item.recordId}" type="text" value="${f[isVideo ? '视频链接' : '链接'] || ''}" class="w-full bg-slate-50 border border-transparent p-3 rounded-xl text-[10px] font-mono text-blue-600 outline-none transition-all">
                        </div>
                    </div>

                    <button onclick="updateSingle('${item.recordId}', ${isVideo})" class="w-full lg:w-auto bg-slate-900 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase active:scale-90 transition-all">更新</button>
                </div>
                `;
            }).join('');

            if(currentCat === '全部') {
                new Sortable(list, { 
                    handle: '.drag-handle', 
                    animation: 250, 
                    onEnd: () => document.getElementById('save-order-btn').classList.remove('hidden') 
                });
            }
        }

        async function updateSingle(rid, isVideo) {
            const fields = {
                "标题": document.getElementById(`t-${rid}`).value,
                "分类": document.getElementById(`c-${rid}`).value
            };
            fields[isVideo ? "视频链接" : "链接"] = document.getElementById(`l-${rid}`).value;

            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records: [{ recordId: rid, fields }] })
            });
            if((await res.json()).success) { alert("✅ 分类与内容已同步"); fetchData(); }
        }

        async function saveOrder() {
            const items = document.querySelectorAll('.product-item');
            const records = Array.from(items).map((el, index) => ({
                recordId: el.getAttribute('data-id'),
                fields: { "排序": index + 1 }
            }));
            const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ records })
            });
            if((await res.json()).success) { alert("✅ 排序已保存"); location.reload(); }
        }
    </script>
</body>
</html>
