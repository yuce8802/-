<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | 排版控制中心修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', 'PingFang SC', sans-serif; background: #f8fafc; color: #0f172a; }
        #lock-screen { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sortable-ghost { opacity: 0.1; }
        .drag-handle { cursor: grab; }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100 text-center max-w-sm w-full mx-4">
            <h2 class="text-2xl font-black mb-6 tracking-tight">VortinT 管理后台</h2>
            <input type="password" id="passcode" placeholder="输入 666888" class="w-full bg-slate-50 border-none p-5 rounded-2xl text-center font-bold text-2xl mb-6 shadow-inner outline-none focus:ring-2 ring-blue-500/20">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-blue-200 active:scale-95 transition-all">确认解锁</button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tighter">自由排版控制台</h1>
                <p class="text-blue-500 text-[10px] font-black tracking-[0.2em] uppercase">RUIHANG INT. · CMS v4.6</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="saveOrder()" id="save-order-btn" class="hidden bg-green-500 text-white px-6 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest shadow-lg">保存新排序</button>
                <button onclick="goBackHome()" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest">返回官网</button>
            </div>
        </header>

        <div id="product-list" class="space-y-4 text-center">
            <div class="py-24 bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs animate-pulse">正在连接维格表数据库...</p>
            </div>
        </div>

        <footer class="mt-20 text-center opacity-30 text-[9px] font-mono">SYSTEM READY</footer>
    </div>

    <script>
        const CFG = { 
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", 
            SHEET: "dstUcVqARey53sJnMh", 
            PASS: "666888" 
        };

        let db = [];
        let sortableInstance;

        function checkPass() {
            if(document.getElementById('passcode').value === CFG.PASS) {
                document.getElementById('lock-screen').style.display = 'none';
                fetchData();
            } else { alert("代码错误"); }
        }

        function goBackHome() { alert("您辛苦了！"); location.href = 'index.html'; }

        async function fetchData() {
            const list = document.getElementById('product-list');
            try {
                // 增加超时处理和错误捕捉
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records?sort=[{"field":"排序","order":"asc"}]`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const json = await res.json();
                
                if(!json.success) {
                    list.innerHTML = `<div class="p-10 text-red-500 font-bold bg-white rounded-3xl">API连接失败: ${json.message}</div>`;
                    return;
                }

                db = json.data.records;
                renderList();
            } catch (e) {
                list.innerHTML = `<div class="p-10 text-red-500 font-bold bg-white rounded-3xl">网络错误，请检查API Token是否有效</div>`;
            }
        }

        function renderList() {
            const list = document.getElementById('product-list');
            if(db.length === 0) {
                list.innerHTML = `<div class="p-10 text-slate-400 bg-white rounded-3xl">表格中没有任何数据</div>`;
                return;
            }

            list.innerHTML = db.map((item, index) => {
                const f = item.fields;
                // 兼容性处理：如果没有图片列，显示灰色块
                const img = (f['图片'] && Array.isArray(f['图片'])) ? f['图片'][0].url : 'https://via.placeholder.com/100/f1f5f9/cbd5e1?text=No+Img';
                
                // 核心逻辑：第一项显示视频链接，其它显示常规链接
                const fieldName = (index === 0) ? "视频链接" : "链接";
                const labelText = (index === 0) ? "首屏海报视频 (MP4)" : "Amazon/跳转链接";
                const linkValue = f[fieldName] || "";

                return `
                <div class="product-card bg-white p-4 md:p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center gap-6 text-left transition-all" data-id="${item.recordId}">
                    <div class="drag-handle text-slate-200 hover:text-blue-500 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16"></path></svg>
                    </div>

                    <img src="${img}" class="w-16 h-16 rounded-2xl object-cover bg-slate-50 border border-slate-50">
                    
                    <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex flex-col">
                            <span class="text-[8px] font-black text-slate-300 uppercase mb-1">标题名称</span>
                            <input id="t-${item.recordId}" type="text" value="${f['标题'] || ''}" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm font-bold text-slate-700 outline-none">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[8px] font-black text-blue-400 uppercase mb-1">${labelText}</span>
                            <input id="l-${item.recordId}" type="text" value="${linkValue}" class="w-full bg-slate-50 border-none p-3 rounded-xl text-[10px] font-mono text-blue-600 outline-none">
                        </div>
                    </div>

                    <button onclick="updateSingle('${item.recordId}', ${index === 0})" class="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-90">更新</button>
                </div>
                `;
            }).join('');

            // 初始化排序
            if(sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(list, {
                handle: '.drag-handle',
                animation: 200,
                onEnd: () => { document.getElementById('save-order-btn').classList.remove('hidden'); }
            });
        }

        async function updateSingle(rid, isVideo) {
            const fieldName = isVideo ? "视频链接" : "链接";
            const updateFields = { 
                "标题": document.getElementById(`t-${rid}`).value,
            };
            updateFields[fieldName] = document.getElementById(`l-${rid}`).value;

            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ records: [{ recordId: rid, fields: updateFields }] })
                });
                const result = await res.json();
                alert(result.success ? "✅ 更新成功" : "❌ 失败: " + result.message);
            } catch (e) { alert("网络连接异常"); }
        }

        async function saveOrder() {
            const btn = document.getElementById('save-order-btn');
            btn.innerText = "同步中...";
            const items = document.querySelectorAll('.product-card');
            const records = Array.from(items).map((el, index) => ({
                recordId: el.getAttribute('data-id'),
                fields: { "排序": index + 1 } 
            }));

            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ records })
                });
                const data = await res.json();
                if(data.success) {
                    btn.classList.add('hidden');
                    alert("✅ 排序已保存");
                    fetchData(); 
                }
            } catch (e) { alert("同步失败"); }
            btn.innerText = "保存新排序";
        }
    </script>
</body>
</html>
