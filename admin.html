<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #f8fafc; color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(37, 99, 235, 0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-blue-50">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl">V</div>
                <div>
                    <h1 class="text-xl font-black text-blue-900 tracking-tighter uppercase">VortinT Admin</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Inventory Management</p>
                </div>
            </div>
            <div class="flex space-x-3">
                <button onclick="location.href='index.html'" class="px-5 py-2.5 rounded-xl border-2 border-slate-200 text-slate-600 text-xs font-bold hover:bg-slate-50 transition-all uppercase">View Site</button>
                <button onclick="fetchData()" class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-xs font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all uppercase">Sync Data</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-[2.5rem] sticky top-8">
                    <h2 class="text-sm font-black text-blue-900 mb-6 uppercase tracking-widest">Product Editor</h2>
                    <form id="p-form" class="space-y-4">
                        <input type="hidden" id="edit-id">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block ml-2">Title</label>
                            <input type="text" id="f-title" placeholder="Product Name" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none text-sm transition-all font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block ml-2">Image URL</label>
                            <input type="text" id="f-img" placeholder="Cloudinary/Web Link" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none text-sm transition-all font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block ml-2">Store Link</label>
                            <input type="text" id="f-link" placeholder="Purchase URL" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none text-sm transition-all font-bold">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block ml-2">Sort Order</label>
                                <input type="number" id="f-sort" placeholder="99" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none text-sm transition-all font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block ml-2">Category</label>
                                <select id="f-cat" class="w-full px-4 py-3 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-400 outline-none text-sm transition-all font-bold">
                                    <option value="Storage">Storage</option>
                                    <option value="New">New Arrival</option>
                                </select>
                            </div>
                        </div>
                        <button type="button" onclick="saveProduct()" class="w-full py-4 mt-4 rounded-2xl bg-blue-600 text-white font-black text-xs uppercase tracking-widest hover:bg-blue-700 transition-all shadow-xl shadow-blue-100">Update Database</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div id="status-bar" class="hidden bg-emerald-50 text-emerald-600 px-6 py-4 rounded-2xl border border-emerald-100 text-[10px] font-black uppercase tracking-widest animate-pulse">Syncing with Vika.cn...</div>
                <div id="data-list" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 与主页一致的配置
        const CFG = {
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz",
            SHEET: "dstUcVqARey53sJnMh"
        };

        let localData = [];

        async function fetchData() {
            showStatus(true);
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const { data } = await res.json();
                // 使用主页相同的排序逻辑
                localData = data.records.sort((a,b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                render();
            } catch (e) { alert('Fetch failed: ' + e); }
            showStatus(false);
        }

        function render() {
            const list = document.getElementById('data-list');
            list.innerHTML = localData.map(p => {
                const f = p.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || '');
                return `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-between group hover:border-blue-200 transition-all">
                    <div class="flex items-center space-x-4">
                        <img src="${img}" class="w-16 h-16 rounded-2xl object-cover bg-slate-50">
                        <div>
                            <h3 class="font-black text-blue-900 text-sm uppercase tracking-tighter">${f['标题'] || 'No Title'}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Order: ${f['排序'] || 'Auto'} • ID: ${p.recordId.slice(-4)}</p>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editP('${p.recordId}')" class="p-3 rounded-xl bg-slate-50 text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                        <button onclick="deleteP('${p.recordId}')" class="p-3 rounded-xl bg-slate-50 text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function editP(id) {
            const p = localData.find(x => x.recordId === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('f-title').value = p.fields['标题'] || '';
            document.getElementById('f-img').value = Array.isArray(p.fields['图片']) ? p.fields['图片'][0].url : p.fields['图片'];
            document.getElementById('f-link').value = p.fields['链接'] || '';
            document.getElementById('f-sort').value = p.fields['排序'] || '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveProduct() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                records: [{
                    recordId: id,
                    fields: {
                        "标题": document.getElementById('f-title').value,
                        "图片": document.getElementById('f-img').value,
                        "链接": document.getElementById('f-link').value,
                        "排序": parseInt(document.getElementById('f-sort').value) || 0
                    }
                }]
            };

            showStatus(true);
            try {
                await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                fetchData();
                document.getElementById('p-form').reset();
            } catch (e) { alert('Save Error'); }
            showStatus(false);
        }

        async function deleteP(id) {
            if(!confirm('Delete permanently?')) return;
            showStatus(true);
            try {
                await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records?recordIds=${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                fetchData();
            } catch (e) { alert('Delete Error'); }
            showStatus(false);
        }

        function showStatus(show) {
            document.getElementById('status-bar').style.display = show ? 'block' : 'none';
        }

        window.onload = fetchData;
    </script>
</body>
</html>
