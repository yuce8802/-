<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | 官方展示店</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'PingFang SC', sans-serif; background: #ffffff; color: #000; overflow-x: hidden; }
        .brand-font { font-family: 'Space Grotesk', sans-serif; }
        .filter-btn.active { background: #000; color: #fff; border-color: #000; transform: scale(1.05); }
        .product-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <span class="brand-font text-2xl font-black tracking-tighter">VortinT</span>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[9px] font-bold uppercase tracking-widest text-slate-400">Live Catalog</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest flex-shrink-0">Filter By:</span>
                    <div id="category-nav" class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                        </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
            </div>
    </main>

    <script>
        const CFG = { 
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", 
            SHEET: "dstUcVqARey53sJnMh" 
        };

        let allData = [];
        let currentFilter = '全部';

        async function init() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const json = await res.json();
                if(json.success) {
                    allData = json.data.records.sort((a, b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                    renderUI();
                }
            } catch (e) { console.error("Data connection failed."); }
        }

        function renderUI() {
            // --- 核心升级：拆分组合标签 ---
            const tagSet = new Set();
            allData.forEach(item => {
                const tags = item.fields['分类'];
                if (tags) {
                    // 按逗号拆分，去掉空格，逐个加入 Set 集合进行去重
                    tags.split(',').map(t => t.trim()).forEach(t => tagSet.add(t));
                }
            });

            const categories = ['全部', ...Array.from(tagSet)];
            
            const nav = document.getElementById('category-nav');
            nav.innerHTML = categories.map(cat => `
                <button onclick="setFilter('${cat}')" 
                        class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-slate-100 text-[11px] font-bold transition-all hover:border-black ${currentFilter === cat ? 'active' : ''}">
                    ${cat}
                </button>
            `).join('');

            renderGrid();
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderUI();
        }

        function renderGrid() {
            const grid = document.getElementById('product-grid');
            
            // --- 核心升级：模糊包含识别 ---
            const filtered = currentFilter === '全部' 
                ? allData 
                : allData.filter(item => {
                    const tags = item.fields['分类'] || '';
                    return tags.split(',').map(t => t.trim()).includes(currentFilter);
                });

            grid.innerHTML = filtered.map(item => {
                const f = item.fields;
                // 将标签字符串转为数组，方便展示小标签
                const tagsArr = f['分类'] ? f['分类'].split(',').map(t => t.trim()) : [];
                
                return `
                <div class="product-card group opacity-0 translate-y-4" style="animation: fadeInUp 0.6s forwards">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-[2.5rem] bg-slate-50 border border-slate-100">
                        <img src="${f['图片'] || ''}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                        <div class="absolute top-6 left-6 flex flex-wrap gap-2">
                            ${tagsArr.map(t => `<div class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-tighter shadow-sm">${t}</div>`).join('')}
                        </div>
                    </div>
                    <div class="mt-8 flex justify-between items-end px-2">
                        <div class="max-w-[70%]">
                            <h3 class="text-2xl font-bold tracking-tight text-slate-900 leading-none mb-2">${f['标题'] || 'Premium Smart Space'}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">VortinT Signature</p>
                        </div>
                        <a href="${f['链接'] || '#'}" target="_blank" class="bg-black text-white px-8 py-4 rounded-full text-[10px] font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all shadow-xl shadow-slate-200">
                            View Deal
                        </a>
                    </div>
                </div>
                `;
            }).join('');
        }

        document.head.insertAdjacentHTML('beforeend', `
            <style>
                @keyframes fadeInUp {
                    to { opacity: 1; transform: translateY(0); }
                }
            </style>
        `);

        init();
    </script>
</body>
</html>
