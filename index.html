<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        
        /* 💡 温馨底色 */
        body { 
            font-family: 'Inter', 'Noto Sans SC', sans-serif; 
            background-color: #FDFBF7; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
        }
        
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #1d4ed8, 0 2px 0 #1e40af, 0 3px 0 #1e3a8a, 0 4px 0 #172554, 0 10px 20px rgba(37,99,235,.2);
        }

        /* 💡 核心：选中浮起动效 */
        .product-card { 
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            will-change: transform, box-shadow;
            background: white;
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        /* 悬浮时的“浮起”效果 */
        .product-card:hover {
            transform: translateY(-15px) scale(1.05) !important;
            box-shadow: 0 30px 60px rgba(183, 153, 123, 0.2);
            z-index: 50 !important;
        }

        /* 模式切换容器 */
        #product-grid { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; min-height: 450px; position: relative; }

        /* 模式 1: 堆叠 */
        .mode-stack { display: flex !important; flex-direction: column; align-items: center; perspective: 2000px; padding-top: 50px; padding-bottom: 300px; }
        .mode-stack .product-card { width: 85vw; max-width: 380px; margin-bottom: -160px; transform: rotateX(20deg) scale(0.9); }

        /* 模式 2: 3D环形 */
        .mode-ring { position: relative; height: 600px; display: block !important; perspective: 1200px; animation: rotateRing 25s linear infinite; }
        .mode-ring .product-card { 
            position: absolute; left: 50%; top: 50%; 
            width: 160px; margin-left: -80px; margin-top: -100px; 
            transform: rotateY(var(--ry)) translateZ(280px);
            backface-visibility: hidden;
        }
        @keyframes rotateRing { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .mode-ring:active { animation-play-state: paused; }

        /* Logo 长按进度条 */
        .press-ring { position: absolute; inset: -4px; border: 4px solid #2563eb; border-radius: 16px; clip-path: inset(0 100% 0 0); transition: clip-path 0.8s linear; pointer-events: none; }
        .pressing .press-ring { clip-path: inset(0 0 0 0); }

        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: #2563eb; color: white; padding: 16px 32px; border-radius: 99px; font-weight: 900; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toast">MODE SWITCHED</div>

    <div id="adminPanel" class="admin-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-xs w-full mx-auto shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-blue-600 mb-6 italic">Site Status</h2>
            <div class="space-y-4">
                <div class="flex justify-between border-b pb-2"><span class="text-gray-400 text-[10px] font-bold">VISITS</span><span id="visitCount" class="text-2xl font-black">0</span></div>
                <div class="flex justify-between border-b pb-2"><span class="text-gray-400 text-[10px] font-bold">ITEMS</span><span id="liveProducts" class="text-2xl font-black">0</span></div>
            </div>
            <button onclick="document.getElementById('adminPanel').style.display='none'" class="mt-6 w-full py-3 bg-black text-white rounded-xl text-[10px] font-black uppercase">Close</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div id="logoWrapper" class="relative">
                <div class="press-ring"></div>
                <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                     onclick="handleLogoClick()" class="h-12 md:h-14 w-auto rounded-xl cursor-pointer select-none shadow-sm active:scale-90 transition-transform">
            </div>
            <div class="flex items-center space-x-2">
                <button id="langBtn" onclick="toggleLang()" class="border-[1.5px] border-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase">EN/中</button>
                <button onclick="copyEmail()" class="bg-blue-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase shadow-lg shadow-blue-500/30">Email</button>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16 text-center md:text-left">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase glow-3d">Smart Space</h1>
        <h1 id="tagline" class="text-4xl md:text-7xl font-black italic text-gray-800 mt-2 opacity-90">For Kids.</h1>
        <p class="text-lg text-gray-400 font-bold mt-4">Focusing on <span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4 overflow-visible">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10">
            <div id="loading" class="col-span-full text-center py-20 font-black text-gray-300 text-xl animate-pulse">CONNECTING...</div>
        </div>
    </main>

    <footer class="py-24 text-center">
        <p class="text-[10px] text-gray-300 font-black tracking-[0.3em] mb-4">VORTINT BRAND EXPERIENCE</p>
        <button onclick="copyEmail()" class="text-sm font-black text-blue-600 border-b-2 border-blue-100 pb-1">contact@vortexd.com</button>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        
        let viewMode = 0; 
        let currentLang = localStorage.getItem('vortint_lang') || 'en';
        let allProducts = [];
        let pressTimer;
        let logoClicks = 0;
        let typedInstance;

        function vib(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

        // 💡 交互逻辑：长按 Logo 切换模式
        const logo = document.getElementById('logoWrapper');
        const startPress = () => {
            logo.classList.add('pressing');
            pressTimer = setTimeout(() => {
                viewMode = (viewMode + 1) % 3;
                vib([60, 30, 60]);
                renderUI();
                const modes = ["GRID", "STACK", "RING"];
                showToast(modes[viewMode] + " MODE");
                logo.classList.remove('pressing');
            }, 800);
        };
        const cancelPress = () => { clearTimeout(pressTimer); logo.classList.remove('pressing'); };

        logo.onmousedown = startPress; logo.ontouchstart = startPress;
        logo.onmouseup = cancelPress; logo.ontouchend = cancelPress;

        function handleLogoClick() {
            vib(10);
            logoClicks++;
            if (logoClicks === 5) {
                document.getElementById('adminPanel').style.display = 'flex';
                logoClicks = 0;
            }
            setTimeout(() => logoClicks = 0, 3000);
        }

        async function fetchProducts() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const result = await response.json();
                if (result.success) {
                    allProducts = result.data.records;
                    updateStats();
                    updateContent();
                }
            } catch (e) { console.error(e); }
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            if (allProducts.length === 0) return;

            grid.className = viewMode === 0 ? "grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10" : 
                             viewMode === 1 ? "mode-stack" : "mode-ring";

            const count = allProducts.length;
            grid.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = f['图片'] || "";
                if (Array.isArray(img)) img = img[0].url;
                img = img.replace("http://", "https://");
                
                const angle = (360 / count) * i;
                const style = viewMode === 2 ? `--ry: ${angle}deg;` : '';

                return `
                <div class="product-card rounded-[2rem] p-4 shadow-sm text-left" style="z-index: ${i}; ${style}">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-4 pointer-events-none" onerror="this.src='https://placehold.co/400x400?text=VortinT'">
                    <h3 class="text-[11px] font-black line-clamp-2 h-10 mb-3 leading-tight text-gray-800 opacity-90">${f['标题'] || 'Item'}</h3>
                    <a href="${f['链接'] || '#'}" target="_blank" onclick="vib(15)" class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Explore →</a>
                </div>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            document.getElementById('tagline').innerText = isEn ? "For Kids." : "为了孩子.";
            document.getElementById('langBtn').innerText = isEn ? "EN / 中" : "中 / EN";
            if (typedInstance) typedInstance.destroy();
            typedInstance = new Typed('#typed', { 
                strings: isEn ? ['Toy Storage.', 'Reading Spaces.', 'Tidy Habits.'] : ['玩具收纳.', '阅读空间.', '习惯养成.'], 
                typeSpeed: 50, loop: true 
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            updateContent();
        }

        function updateStats() {
            let visits = parseInt(localStorage.getItem('vortint_visits') || '0') + 1;
            localStorage.setItem('vortint_visits', visits);
            document.getElementById('visitCount').innerText = visits;
            document.getElementById('liveProducts').innerText = allProducts.length;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => {
                vib(40); showToast("COPIED");
            });
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
