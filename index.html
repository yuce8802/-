<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | 智能儿童空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@500;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FAFAFA; }
        .hero-gradient { background: linear-gradient(to r, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-gray-100 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="h-8 w-auto">
            <a href="https://ncn9cn4hfp6k.feishu.cn/base/RjAGbIVhKaRI0usUsGnc9lwPnBg" target="_blank" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest border-b-2 border-blue-100 hover:border-blue-600 transition-all">后台编辑 (飞书)</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20">
        <h1 class="text-6xl font-black tracking-tighter leading-tight">Smart Space <br><span class="hero-gradient italic">For Kids.</span></h1>
        <p class="mt-6 text-lg text-gray-400">专注于 <span id="typed" class="text-black font-bold border-b-4 border-blue-500"></span></p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="loading" class="text-center py-20 text-gray-300 animate-pulse font-bold tracking-widest">同步飞书数据中...</div>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <script>
        // 指向我们刚才建的 Vercel 后端接口
        const API_URL = "/api/get-products"; 

        new Typed('#typed', {
            strings: ['毛绒玩具收纳.', '儿童阅读空间.', '垂直弹力绳设计.'],
            typeSpeed: 60, loop: true
        });

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const items = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderProducts(items);
            } catch (e) {
                document.getElementById('loading').innerText = "数据同步中，请刷新页面...";
            }
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(item => {
                const p = item.fields;
                // 处理图片：如果是飞书附件，这里需要解析链接；如果是直接贴的链接，直接显示
                const imgUrl = Array.isArray(p.image) ? p.image[0].url : p.image;
                return `
                <a href="${p.link || '#'}" target="_blank" class="group bg-white rounded-[2.5rem] p-4 shadow-sm hover:shadow-2xl transition-all block">
                    <div class="aspect-[4/5] overflow-hidden rounded-[2rem] bg-gray-100 mb-6">
                        <img src="${imgUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="px-2">
                        <h3 class="text-xl font-bold text-gray-800">${p.name || '未命名产品'}</h3>
                        <p class="text-blue-600 font-black text-[10px] mt-2 uppercase tracking-widest">Shop Now →</p>
                    </div>
                </a>
                `;
            }).join('');
        }

        fetchProducts();
    </script>
</body>
</html>
