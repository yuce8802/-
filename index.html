<div id="copyToast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full text-xs font-bold opacity-0 transition-opacity pointer-events-none z-[1000]">
    Email Copied! / 邮箱已复制
</div>

<script>
    // 💡 增强后的邮箱处理函数
    function handleEmailClick(e) {
        vib(20);
        const email = "contact@vortexd.com";
        
        // 尝试复制到剪贴板
        navigator.clipboard.writeText(email).then(() => {
            const toast = document.getElementById('copyToast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        });

        // 依然保留 mailto，如果系统支持则会打开
        // e.preventDefault(); // 如果你只想让它复制而不想唤起邮件，可以取消注释这行
    }
</script>

<a href="mailto:contact@vortexd.com" onclick="handleEmailClick(event)" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
    <span class="hidden md:inline">Contact Us</span><span class="md:hidden">Mail</span>
</a>
