<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #fff; color: #0f172a; overflow-x: hidden; }
        
        /* 1.5s 进度条 */
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #2563eb; width: 0%; }
        .modal-show .progress-bar { width: 100%; transition: width 1.5s linear; }

        /* 弹窗样式 */
        #detail-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 2rem; transform: scale(0.9); opacity: 0; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .modal-show .modal-content { transform: scale(1); opacity: 1; }
        
        /* 悬浮客服动画 */
        .float-btn { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0; background: transparent; }
    </style>
</head>
<body class="bg-slate-50/30">

    <div id="splash" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center transition-opacity duration-700">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="w-16 h-16 rounded-full animate-bounce">
    </div>

    <div id="detail-modal" onclick="closeDetail()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="progress-bar" id="p-bar"></div>
            <img id="m-img" src="" class="w-full aspect-square object-cover">
            <div class="p-8 text-center">
                <h2 id="m-title" class="text-xl font-bold mb-4 text-slate-800 uppercase tracking-tighter"></h2>
                <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase animate-pulse inline-block">Connecting Store...</div>
            </div>
        </div>
    </div>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[92vw] max-w-5xl bg-white/80 backdrop-blur-xl rounded-full px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 onclick="adminGate()" class="h-8 w-8 rounded-full cursor-pointer active:scale-90 transition-transform shadow-sm">
            <span class="text-[10px] font-black text-slate-800 uppercase tracking-tighter">VortinT™</span>
        </div>
        
        <div class="flex items-center space-x-2 bg-slate-100/50 px-3 py-1.5 rounded-full border border-slate-100">
            <span class="flex h-2 w-2 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <span id="visitor-count" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Live: 1,028</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-24 pb-20">
        
        <section class="mb-10 rounded-[2.5rem] overflow-hidden shadow-2xl bg-black aspect-video relative group">
            <video id="v-player" class="w-full h-full object-cover" autoplay muted loop playsinline></video>
            
            <div class="absolute top-6 left-8 z-10 flex items-center space-x-2">
                <span class="bg-red-500 text-white text-[9px] font-black px-2 py-0.5 rounded-md animate-pulse shadow-lg shadow-red-500/30">HOT</span>
                <p class="text-white/80 text-[9px] font-bold tracking-widest uppercase shadow-black">Bestsellers Showcase</p>
            </div>

            <div class="absolute bottom-6 left-8 z-10">
                <h1 id="typed" class="text-white text-xl md:text-2xl font-bold drop-shadow-lg"></h1>
            </div>

            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
        </section>

        <div id="p-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
            <div class="aspect-square bg-slate-100 animate-pulse rounded-[2rem]"></div>
            <div class="aspect-square bg-slate-100 animate-pulse rounded-[2rem]"></div>
            <div class="aspect-square bg-slate-100 animate-pulse rounded-[2rem]"></div>
        </div>
    </main>

    <div class="fixed bottom-8 right-8 z-[1500]">
        <a id="service-link" href="mailto:cs@vortexd.com" class="float-btn bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all group relative">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
            </svg>
            <span class="absolute right-16 bg-white text-slate-900 text-[10px] font-black py-2 px-4 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 transition-opacity border border-slate-100 uppercase tracking-widest">Live Support</span>
        </a>
    </div>

    <script>
        const CFG = { 
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", 
            SHEET: "dstUcVqARey53sJnMh",
            DEFAULT_V: "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4" 
        };
        
        let products = [], timer = null, clicks = 0;

        async function init() {
            // 随机模拟实时人数
            document.getElementById('visitor-count').innerText = `Live: ${Math.floor(Math.random() * (1600 - 900) + 900)}`;

            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const { data } = await res.json();
                products = data.records;

                // 自动抓取第一行作为爆款展示视频
                const videoUrl = products[0].fields['视频链接'];
                document.getElementById('v-player').src = videoUrl || CFG.DEFAULT_V;

                // 渲染商品
                render();

                // 爆款文案初始化
                new Typed('#typed', { 
                    strings: [
                        'Top Rated Toy Storage.', 
                        '7 Elastic Cords Innovation.', 
                        'Join 10,000+ Happy Families.', 
                        'VortinT™ Best Seller.'
                    ], 
                    typeSpeed: 50, 
                    backSpeed: 30,
                    loop: true 
                });

                // 移除闪屏
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 700);

            } catch (e) { 
                console.error("Data Load Error");
                document.getElementById('v-player').src = CFG.DEFAULT_V;
            }
        }

        function render() {
            const grid = document.getElementById('p-grid');
            const displayList = products.filter(r => r.fields['标题'] !== 'SERVICE_LINK');
            
            grid.innerHTML = displayList.map((p, i) => {
                const f = p.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];
                return `
                <div class="bg-white p-2.5 rounded-[2rem] shadow-sm border border-slate-100 active:scale-95 transition-all cursor-pointer group" onclick="openP(${i})">
                    <div class="overflow-hidden rounded-[1.5rem] mb-3">
                        <img src="${img}" class="w-full aspect-square object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <h3 class="text-[10px] font-black px-3 truncate text-slate-700 uppercase tracking-tighter">${f['标题'] || 'VortinT Unit'}</h3>
                </div>`;
            }).join('');
        }

        function openP(i) {
            const f = products[i].fields;
            document.getElementById('m-img').src = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];
            document.getElementById('m-title').innerText = f['标题'];
            
            const modal = document.getElementById('detail-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('modal-show'), 10);

            // 1.5秒自动跳转
            timer = setTimeout(() => {
                if (modal.classList.contains('modal-show')) window.location.href = f['链接'];
            }, 1500);
        }

        function closeDetail() {
            clearTimeout(timer);
            document.getElementById('detail-modal').classList.remove('modal-show');
            setTimeout(() => document.getElementById('detail-modal').style.display = 'none', 300);
        }

        // 后台暗门：连点Logo 5次
        function adminGate() {
            clicks++;
            if(clicks >= 5) window.location.href = 'admin.html';
            setTimeout(() => clicks = 0, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
