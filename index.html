<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        
        /* 进度条与弹窗 */
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #2563eb; width: 0%; }
        .modal-show .progress-bar { width: 100%; transition: width 1.5s linear; }
        #detail-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 2rem; transform: scale(0.9); opacity: 0; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; border: 2px solid #eff6ff; }
        .modal-show .modal-content { transform: scale(1); opacity: 1; }
        
        /* 胶囊按钮样式 */
        .filter-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        
        /* 列表动画 */
        .p-card { transition: all 0.5s ease; }
        .nav-hidden { transform: translateY(-100%); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-blue-50/20">

    <div id="splash" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center transition-opacity duration-700">
        <div class="flex flex-col items-center">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="w-24 h-24 rounded-full animate-bounce mb-5 border-[3px] border-blue-500 shadow-xl object-cover">
            <span class="text-blue-600 font-bold text-base tracking-widest uppercase animate-pulse">Loading VortinT...</span>
        </div>
    </div>

    <div id="detail-modal" onclick="closeDetail()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="progress-bar" id="p-bar"></div>
            <img id="m-img" src="" class="w-full aspect-square object-cover bg-blue-50">
            <div class="p-8 text-center">
                <h2 id="m-title" class="text-xl font-bold mb-4 text-slate-800 uppercase tracking-tighter"></h2>
                <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase animate-pulse inline-block">Connecting Store...</div>
            </div>
        </div>
    </div>

    <nav id="main-nav" class="fixed top-0 left-0 w-full z-[100] bg-white/95 backdrop-blur-xl border-b border-blue-100 shadow-sm transition-transform duration-300">
        <div class="max-w-5xl mx-auto px-6">
            <div class="flex justify-between items-center py-3">
                <div class="flex items-center space-x-3">
                    <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" onclick="adminGate()" class="h-10 w-10 rounded-full cursor-pointer shadow-md object-cover border-2 border-white">
                    <span class="text-[10px] md:text-xs font-black text-blue-900 uppercase tracking-tighter">瑞航国际家居</span>
                </div>
            </div>
            <div id="cat-nav" class="flex space-x-2 overflow-x-auto pb-3 no-scrollbar items-center">
                </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-36 pb-12">
        <section class="mb-10 rounded-[2.5rem] overflow-hidden shadow-2xl bg-black aspect-video relative">
            <video id="v-player" class="w-full h-full object-cover" autoplay muted loop playsinline></video>
            <div class="absolute bottom-6 left-8 z-10"><h1 id="typed" class="text-white text-xl md:text-2xl font-bold"></h1></div>
            <div class="absolute inset-0 bg-gradient-to-t from-blue-900/80 via-transparent pointer-events-none"></div>
        </section>

        <div id="p-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6 min-h-[400px]">
            </div>
    </main>

    <div class="fixed bottom-8 right-8 z-[1500]">
        <a id="service-link" href="#" target="_blank" class="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl border-2 border-white active:scale-95 transition-transform">
            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.63 1.44h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>
    </div>

    <script>
        const CFG = { TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", SHEET: "dstUcVqARey53sJnMh", WA_PHONE: "85269517551" };
        let products = [], currentCat = '全部', clicks = 0;

        async function init() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const { data } = await res.json();
                products = data.records.sort((a,b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                
                document.getElementById('v-player').src = products[0]?.fields['视频链接'] || "";
                
                renderFilters();
                renderGrid();
                
                new Typed('#typed', { strings: ['Toy Storage Innovation.', 'Happy Families Choice.', 'VortinT™ Signature.'], typeSpeed: 50, loop: true });
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 700);
            } catch (e) { console.error("Data Error"); }
        }

        function renderFilters() {
            const nav = document.getElementById('cat-nav');
            // 提取所有分类并去重
            const cats = ['全部'];
            products.forEach(p => {
                const c = p.fields['分类'];
                if(c && p.fields['标题'] !== 'SERVICE_LINK') {
                    c.split(',').map(s => s.trim()).forEach(s => {
                        if(!cats.includes(s)) cats.push(s);
                    });
                }
            });

            nav.innerHTML = cats.map(cat => `
                <button onclick="setFilter('${cat}')" 
                        class="filter-btn flex-shrink-0 px-5 py-1.5 rounded-full border border-blue-100 text-[10px] font-black uppercase tracking-wider ${currentCat === cat ? 'active' : 'bg-white text-blue-900/60'}">
                    ${cat}
                </button>
            `).join('');
        }

        function setFilter(cat) {
            currentCat = cat;
            renderFilters();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('p-grid');
            let list = products.filter(r => r.fields['标题'] !== 'SERVICE_LINK');
            
            if(currentCat !== '全部') {
                list = list.filter(p => (p.fields['分类'] || '').includes(currentCat));
            }

            grid.innerHTML = list.map((p) => {
                const f = p.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];
                return `
                <div class="p-card bg-white p-2.5 rounded-[2rem] shadow-sm border-2 border-transparent hover:border-blue-400 transition-all cursor-pointer group animate-in fade-in zoom-in duration-500" onclick="openP('${p.recordId}')">
                    <div class="overflow-hidden rounded-[1.5rem] mb-3"><img src="${img}" class="w-full aspect-square object-cover group-hover:scale-110 transition-transform duration-700"></div>
                    <h3 class="text-[10px] font-black px-3 truncate uppercase tracking-tighter">${f['标题'] || 'VortinT Unit'}</h3>
                </div>`;
            }).join('');
        }

        function openP(rid) {
            const p = products.find(x => x.recordId === rid);
            const f = p.fields;
            document.getElementById('m-img').src = Array.isArray(f['图片']) ? f['图片'][0].url : f['图片'];
            document.getElementById('m-title').innerText = f['标题'];
            const modal = document.getElementById('detail-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('modal-show'), 10);
            
            const waMsg = encodeURIComponent(`Hi, Interested in ${f['标题']}`);
            document.getElementById('service-link').href = `https://wa.me/${CFG.WA_PHONE}?text=${waMsg}`;
            
            clearTimeout(window.jumpTimer);
            window.jumpTimer = setTimeout(() => { 
                if(modal.classList.contains('modal-show') && f['链接']) window.location.href = f['链接']; 
            }, 1500);
        }

        function closeDetail() {
            clearTimeout(window.jumpTimer);
            document.getElementById('detail-modal').classList.remove('modal-show');
            setTimeout(() => document.getElementById('detail-modal').style.display = 'none', 300);
        }

        function adminGate() { clicks++; if(clicks >= 5) window.location.href = 'admin.html'; setTimeout(() => clicks = 0, 2000); }
        window.onload = init;
    </script>
</body>
</html>
