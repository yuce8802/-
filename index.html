<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FDFBF7; overflow-x: hidden; }
        
        /* 骨架屏动画 */
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .skeleton { background: #eee; animation: shimmer 1.5s infinite; border-radius: 1.5rem; }

        /* 3D 卡片与浮起动效 - 加入 GPU 加速属性 */
        .product-card { 
            background: white; border-radius: 2rem; padding: 1rem;
            box-shadow: 0 10px 25px rgba(183, 153, 123, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, opacity; transform-style: preserve-3d;
            backface-visibility: hidden; /* 减少渲染压力 */
        }

        .product-card:hover {
            transform: translateY(-20px) translateZ(150px) scale(1.05) !important;
            box-shadow: 0 40px 80px rgba(183, 153, 123, 0.25);
            z-index: 999 !important;
        }

        /* 统一容器样式 */
        #product-grid { position: relative; transition: all 0.8s ease; transform-style: preserve-3d; min-height: 400px; }
        .mode-stack { display: flex !important; flex-direction: column; align-items: center; perspective: 2000px; padding-top: 60px; }
        .mode-stack .product-card { width: 85vw; max-width: 360px; margin-top: -140px; transform: rotateX(25deg) translateZ(calc(var(--idx) * 5px)); }
        .mode-ring { display: block !important; height: 500px; perspective: 1200px; animation: rotateRing 25s linear infinite; }
        .mode-ring .product-card { position: absolute; left: 50%; top: 50%; width: 160px; margin-left: -80px; margin-top: -80px; transform: rotateY(var(--ry)) translateZ(280px); }
        @keyframes rotateRing { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .press-ring { position: absolute; inset: -4px; border: 4px solid #2563eb; border-radius: 16px; clip-path: inset(0 100% 0 0); transition: clip-path 0.8s linear; }
        .pressing .press-ring { clip-path: inset(0 0 0 0); }
        
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #1d4ed8, 0 4px 10px rgba(37,99,235,.2);
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/60 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-orange-50">
        <div id="logoWrapper" class="relative">
            <div class="press-ring"></div>
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 class="h-10 rounded-lg cursor-pointer active:scale-90 transition-transform">
        </div>
        <button onclick="copyEmail()" class="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-lg">Contact</button>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-12 text-center md:text-left">
        <h1 class="text-7xl md:text-9xl font-black uppercase glow-3d leading-none">VortinT</h1>
        <p class="text-lg text-gray-400 font-bold mt-4 tracking-tight"><span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        <section class="max-w-4xl mx-auto mb-16 bg-white rounded-[2.5rem] border border-orange-50 overflow-hidden shadow-xl p-2">
            <div class="aspect-video w-full rounded-[1.8rem] overflow-hidden bg-gray-50 relative">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls>
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>
        </section>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10">
            <div class="skeleton h-64"></div><div class="skeleton h-64"></div><div class="skeleton h-64"></div>
        </div>
    </main>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const DEFAULT_VIDEO = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";
        
        let allProducts = [];
        let viewMode = 0;

        // 💡 提速策略：先打字，再异步拿数据
        new Typed('#typed', { 
            strings: ['Toy Storage Magic.', 'Habit Building.', 'Space Aesthetic.'], 
            typeSpeed: 40, loop: true 
        });

        async function init() {
            // 1. 延时加载视频（不阻塞首屏渲染）
            setTimeout(() => {
                const v = document.getElementById('brandVideo');
                document.getElementById('videoSource').src = DEFAULT_VIDEO;
                v.load();
            }, 500);

            // 2. 获取 Vika 数据
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    renderUI();
                }
            } catch (e) { console.error("Loading Error", e); }
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                img = img.replace("http://", "https://");
                const angle = (360 / allProducts.length) * i;
                
                return `
                <div class="product-card" style="--idx: ${i}; --ry: ${angle}deg; z-index: ${i};">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-4">
                    <h3 class="text-[11px] font-black line-clamp-2 h-10 mb-2 text-gray-800">${f['标题'] || 'VortinT Item'}</h3>
                    <a href="${f['链接'] || '#'}" target="_blank" class="text-[9px] font-black text-blue-600 uppercase">Explore →</a>
                </div>`;
            }).join('');
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => alert("Email Copied!"));
        }

        window.onload = init;
    </script>
</body>
</html>
