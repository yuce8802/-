<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FAFAFA; -webkit-tap-highlight-color: transparent; }
        .hero-gradient { background: linear-gradient(to r, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-v { transition: opacity 0.5s ease, transform 0.6s ease-out; opacity: 0; transform: translateY(20px); }
        .fade-v.show { opacity: 1; transform: translateY(0); }
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-blur: 10px; z-index: 999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="adminPanel" class="admin-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-xs w-full mx-auto" onclick="event.stopPropagation()">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-blue-600 mb-6 italic">Internal Status</h2>
            <div class="space-y-4">
                <div class="flex justify-between border-b pb-2"><span class="text-gray-400 text-[10px] font-bold">VISITS</span><span id="visitCount" class="text-2xl font-black">0</span></div>
                <div class="flex justify-between border-b pb-2"><span class="text-gray-400 text-[10px] font-bold">ITEMS</span><span id="liveProducts" class="text-2xl font-black">0</span></div>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md border-b border-gray-100 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 onclick="handleLogoClick()" class="h-10 w-auto rounded-lg">
            <div class="flex space-x-2">
                <button onclick="toggleLang()" class="border-2 border-black px-3 py-1.5 rounded-full text-[9px] font-black uppercase">EN/中</button>
                <a href="mailto:contact@vortexd.com" class="bg-blue-600 text-white px-3 py-1.5 rounded-full text-[9px] font-black uppercase">Mail</a>
            </div>
        </div>
    </nav>

    <header id="hero" class="max-w-6xl mx-auto px-6 py-16 fade-v">
        <h1 class="text-5xl font-black tracking-tighter leading-tight mb-6">Smart Space <br><span class="hero-gradient italic">For Kids.</span></h1>
        <div class="text-lg text-gray-400 font-bold"><span id="sub-title-pre">Focusing on</span> <span id="typed" class="text-black"></span></div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div id="loading" class="text-center py-10 font-black text-gray-200 text-2xl animate-pulse tracking-widest">LOADING...</div>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        let currentLang = localStorage.getItem('vortint_lang') || 'en';
        let allProducts = [];
        let clickCount = 0;
        let typedInstance;

        const i18n = {
            zh: { pre: "专注于", typed: ['毛绒玩具收纳.', '儿童阅读空间.', '弹力绳垂直收纳.'], btn: "立即购买" },
            en: { pre: "Focusing on", typed: ['Plush Toy Storage.', 'Reading Spaces.', 'Vertical Elastic Cords.'], btn: "Shop Now" }
        };

        function vib(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

        function handleLogoClick() {
            vib(15);
            clickCount++;
            if (clickCount === 5) {
                vib([50, 100, 50]);
                document.getElementById('visitCount').innerText = localStorage.getItem('vortint_visits');
                document.getElementById('liveProducts').innerText = allProducts.length;
                document.getElementById('adminPanel').style.display = 'flex';
                clickCount = 0;
            }
        }

        async function fetchProducts() {
            try {
                // 强制 HTTPS 请求
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/dstUcVqARey53sJnMh/records`, {
                    headers: { 'Authorization': `Bearer usk6WsQlH4X6ST2hQRk4vAz` }
                });
                const result = await response.json();
                if (result.success) {
                    allProducts = result.data.records;
                    document.getElementById('loading').style.display = 'none';
                    renderUI();
                }
            } catch (e) { document.getElementById('loading').innerText = "NETWORK ERROR"; }
        }

        function renderUI() {
            document.getElementById('sub-title-pre').innerText = i18n[currentLang].pre;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = allProducts.map(r => {
                const f = r.fields;
                const img = Array.isArray(f.图片) ? f.图片[0].url : (f.图片 || "");
                // 强制将图片链接升级为 https
                const safeImg = img.replace("http://", "https://");
                return `
                <a href="${f.链接 || '#'}" class="fade-v block bg-white rounded-[2rem] p-4 shadow-sm border border-gray-50">
                    <img src="${safeImg}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-4">
                    <h3 class="text-xl font-black mb-2">${f.标题 || 'Item'}</h3>
                    <span class="text-[10px] font-black text-blue-600 uppercase border-b border-blue-100">${i18n[currentLang].btn}</span>
                </a>`;
            }).join('');
            setTimeout(() => {
                document.querySelectorAll('.fade-v').forEach(el => el.classList.add('show'));
            }, 100);
        }

        function toggleLang() {
            vib(20);
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            if(typedInstance) typedInstance.destroy();
            initTyped();
            renderUI();
        }

        function initTyped() {
            typedInstance = new Typed('#typed', { strings: i18n[currentLang].typed, typeSpeed: 50, loop: true });
        }

        window.onload = () => {
            let v = parseInt(localStorage.getItem('vortint_visits') || '0');
            localStorage.setItem('vortint_visits', ++v);
            document.getElementById('hero').classList.add('show');
            initTyped();
            fetchProducts();
        };
    </script>
</body>
</html>
