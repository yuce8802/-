<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FDFBF7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* 品牌蓝白 3D 字效 */
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #1d4ed8, 0 2px 0 #1e40af, 0 8px 15px rgba(37,99,235,0.2);
        }

        /* 3D 核心逻辑：修复层级穿模 */
        .product-card { 
            background: white; border-radius: 2rem; padding: 1rem;
            box-shadow: 0 10px 25px rgba(183, 153, 123, 0.1);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, box-shadow; transform-style: preserve-3d;
        }
        .product-card:hover {
            transform: translateY(-20px) translateZ(150px) scale(1.05) !important;
            box-shadow: 0 40px 80px rgba(183, 153, 123, 0.25);
            z-index: 999 !important;
        }

        #product-grid { position: relative; transition: all 0.8s ease; transform-style: preserve-3d; min-height: 500px; }
        
        /* 模式 1: 堆叠 */
        .mode-stack { display: flex !important; flex-direction: column; align-items: center; perspective: 2000px; padding-top: 60px; }
        .mode-stack .product-card { width: 85vw; max-width: 360px; margin-top: -140px; transform: rotateX(25deg) translateZ(calc(var(--idx) * 8px)); }
        
        /* 模式 2: 环形 */
        .mode-ring { display: block !important; height: 500px; perspective: 1200px; animation: rotateRing 25s linear infinite; }
        .mode-ring .product-card { position: absolute; left: 50%; top: 50%; width: 160px; margin-left: -80px; margin-top: -80px; transform: rotateY(var(--ry)) translateZ(280px); backface-visibility: hidden; }
        @keyframes rotateRing { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* Logo 交互环 */
        .press-ring { position: absolute; inset: -4px; border: 4px solid #2563eb; border-radius: 16px; clip-path: inset(0 100% 0 0); transition: clip-path 0.8s linear; }
        .pressing .press-ring { clip-path: inset(0 0 0 0); }

        /* 消息提示 */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2563eb; color: white; padding: 10px 24px; border-radius: 99px; font-weight: 900; opacity: 0; transition: 0.3s; z-index: 2000; pointer-events: none; }
        #toast.show { opacity: 1; top: 40px; }
        
        /* 骨架屏预加载 */
        .skeleton { background: #eee; animation: shimmer 1.5s infinite; border-radius: 2rem; }
        @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toast">ACTION SUCCESS</div>

    <div id="adminPanel" class="admin-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[2.5rem] w-64 shadow-2xl text-left" onclick="event.stopPropagation()">
            <h2 class="text-[10px] font-black uppercase text-blue-600 mb-4">Admin Dashboard</h2>
            <div class="space-y-3">
                <div class="flex justify-between border-b pb-1"><span class="text-gray-400 text-[10px]">VISITS</span><span id="vCount" class="font-black">0</span></div>
                <div class="flex justify-between border-b pb-1"><span class="text-gray-400 text-[10px]">ITEMS</span><span id="pCount" class="font-black">0</span></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="mt-4 w-full py-2 bg-red-50 text-red-500 rounded-xl text-[10px] font-bold">RESET CACHE</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/60 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-orange-50">
        <div id="logoWrapper" class="relative">
            <div class="press-ring"></div>
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 onclick="handleLogoClick()" class="h-10 rounded-lg cursor-pointer active:scale-90 transition-transform select-none">
        </div>
        <div class="flex items-center space-x-2">
            <button onclick="toggleLang()" class="bg-black/5 px-4 py-2 rounded-full font-black text-[10px] uppercase">EN/中</button>
            <button onclick="copyEmail()" class="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-blue-500/30">Email</button>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-12 text-center md:text-left">
        <h1 class="text-7xl md:text-9xl font-black uppercase glow-3d leading-none">VortinT</h1>
        <h2 id="tagline" class="text-3xl md:text-5xl font-black text-gray-800 italic mt-2">Smart Space For Kids.</h2>
        <p class="text-lg text-gray-400 font-bold mt-4">Focusing on <span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        <section class="max-w-4xl mx-auto mb-16 bg-white rounded-[2.5rem] border border-orange-50 shadow-xl p-2 md:p-4">
            <div class="aspect-video w-full rounded-[1.8rem] overflow-hidden bg-gray-50 relative">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls></video>
            </div>
        </section>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10">
            <div class="skeleton h-64"></div><div class="skeleton h-64"></div><div class="skeleton h-64"></div>
        </div>
    </main>

    <footer class="py-24 text-center">
        <button onclick="copyEmail()" class="text-[10px] font-black text-gray-300 tracking-[0.3em] hover:text-blue-600 transition-colors uppercase">contact@vortexd.com</button>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const HIGH_RES_URL = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";
        // 自动生成低画质链接（压缩率调高，宽度限制）
        const LOW_RES_URL = HIGH_RES_URL.replace("/upload/", "/upload/c_scale,w_480,q_auto:low,br_500k/");

        let allProducts = []; 
        let viewMode = 0; 
        let currentLang = localStorage.getItem('vortint_lang') || 'en';
        let logoClicks = 0;
        let pressTimer;

        // 视频渐进加载
        function loadVideoProgressively() {
            const v = document.getElementById('brandVideo');
            v.src = LOW_RES_URL;
            v.onplaying = () => {
                const preload = document.createElement('video');
                preload.src = HIGH_RES_URL;
                preload.oncanplaythrough = () => {
                    const now = v.currentTime;
                    v.src = HIGH_RES_URL;
                    v.currentTime = now;
                    v.play();
                    v.onplaying = null;
                };
            };
        }

        async function init() {
            loadVideoProgressively();
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    
                    // Vika 视频链接同步优先级
                    const vSource = allProducts.find(r => r.fields['视频链接'])?.fields['视频链接'];
                    if (vSource) {
                        const videoTag = document.getElementById('brandVideo');
                        videoTag.src = vSource;
                        videoTag.load();
                    }

                    updateContent();
                    // 管理员数据更新
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_count') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_count', v);
                }
            } catch (e) { console.error(e); }
        }

        // 核心：长按 Logo 切换 3D 模式
        const logo = document.getElementById('logoWrapper');
        logo.onmousedown = logo.ontouchstart = () => {
            logo.classList.add('pressing');
            pressTimer = setTimeout(() => {
                viewMode = (viewMode + 1) % 3;
                renderUI();
                logo.classList.remove('pressing');
                showToast(["GRID", "STACK", "RING"][viewMode] + " MODE");
            }, 800);
        };
        logo.onmouseup = logo.ontouchend = () => { clearTimeout(pressTimer); logo.classList.remove('pressing'); };

        // 核心：连击进入后台
        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            grid.className = viewMode === 0 ? "grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10" : 
                             viewMode === 1 ? "mode-stack" : "mode-ring";
            
            grid.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                const angle = (360 / allProducts.length) * i;
                return `
                <div class="product-card" style="--idx: ${i}; --ry: ${angle}deg; z-index: ${i};">
                    <img src="${img.replace("http://", "https://")}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-4 pointer-events-none">
                    <h3 class="text-[11px] font-black line-clamp-2 h-10 mb-2 text-gray-800">${f['标题'] || 'Item'}</h3>
                    <a href="${f['链接'] || '#'}" target="_blank" class="text-[9px] font-black text-blue-600 uppercase">Explore →</a>
                </div>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            document.getElementById('tagline').innerText = isEn ? "Smart Space For Kids." : "为了孩子们的智慧空间.";
            new Typed('#typed', { 
                strings: isEn ? ['Toy Storage.', 'Better Habits.', 'Space Magic.'] : ['玩具收纳.', '习惯养成.', '空间美学.'], 
                typeSpeed: 50, loop: true, destroy: true
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            location.reload(); 
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => showToast("EMAIL COPIED"));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        window.onload = init;
    </script>
</body>
</html>
