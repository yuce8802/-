<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Brand Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; background: #FFFFFF; -webkit-tap-highlight-color: transparent; color: #0f172a; }
        
        .hero-title {
            font-size: clamp(2rem, 8vw, 4.5rem);
            line-height: 1; letter-spacing: -0.02em;
            color: #1e293b;
        }

        .detail-section {
            border-bottom: 1px solid #f8fafc;
            padding: 6rem 0;
        }

        .buy-btn {
            background: #2563eb; color: white;
            padding: 1rem 2.5rem; border-radius: 99px;
            font-weight: 800; font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex; align-items: center;
        }
        .buy-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>

    <div id="adminPanel" class="fixed inset-0 bg-white/98 backdrop-blur-3xl z-[9999] hidden items-center justify-center" onclick="this.style.display='none'">
        <div class="p-12 text-center" onclick="event.stopPropagation()">
            <h2 class="text-[10px] font-bold text-blue-600 mb-10 tracking-[0.3em] uppercase">VortinT Intelligence</h2>
            <div class="flex space-x-16 mb-12">
                <div><p class="text-[10px] text-slate-400 font-bold mb-2">VISITORS</p><p id="vCount" class="text-5xl font-black">0</p></div>
                <div><p class="text-[10px] text-slate-400 font-bold mb-2">ITEMS</p><p id="pCount" class="text-5xl font-black">0</p></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[9px] font-black text-slate-300 hover:text-red-500 transition-colors tracking-widest uppercase">Wipe_Local_Cache</button>
        </div>
    </div>

    <nav class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md px-8 py-6 flex justify-between items-center border-b border-slate-50">
        <div class="flex items-center cursor-pointer group" onclick="handleLogoClick()">
            <div class="relative">
                <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                     class="h-14 w-14 md:h-16 md:w-16 object-contain rounded-full ring-2 ring-slate-50 group-hover:ring-blue-100 transition-all shadow-lg shadow-slate-100">
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="toggleLang()" class="text-[10px] font-bold text-slate-300 hover:text-blue-600 transition-colors uppercase px-2">EN/中</button>
            <a href="mailto:gd@vortexd.com" class="bg-slate-50 text-slate-500 px-5 py-2.5 rounded-full font-bold text-[10px] uppercase hover:bg-slate-100 transition-all">GD Support</a>
            <a href="mailto:cs@vortexd.com" class="bg-blue-600 text-white px-5 py-2.5 rounded-full font-bold text-[10px] uppercase shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all">CS Support</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <header class="pt-16 pb-12">
            <h1 class="hero-title font-black uppercase">VORTINT</h1>
            <p class="text-sm text-slate-400 font-bold mt-4 tracking-widest uppercase">Empowering <span id="typed" class="text-blue-600"></span></p>
        </header>

        <section class="mb-12 rounded-[2.5rem] overflow-hidden bg-slate-100 shadow-2xl">
            <div class="aspect-video w-full">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls></video>
            </div>
        </section>

        <div id="product-list" class="divide-y divide-slate-50">
            </div>
    </main>

    <footer class="py-24 text-center">
        <p class="text-slate-200 text-[10px] font-bold tracking-[0.5em] uppercase">VortinT Studios © 2026</p>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const RAW_VIDEO = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";

        let allProducts = []; let currentLang = localStorage.getItem('v_lang') || 'en';
        let logoClicks = 0;

        async function init() {
            document.getElementById('brandVideo').src = RAW_VIDEO;
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    updateContent();
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_total') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_total', v);
                }
            } catch (e) { console.error(e); }
        }

        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        function renderUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                return `
                <section class="detail-section flex flex-col md:flex-row gap-16 items-center">
                    <div class="w-full md:w-1/2">
                        <img src="${img.replace("http://", "https://")}" class="w-full rounded-[2rem] shadow-xl hover:shadow-2xl transition-shadow duration-500">
                    </div>
                    <div class="w-full md:w-1/2 space-y-6">
                        <h2 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight leading-tight">${f['标题'] || 'Design Intelligence Unit'}</h2>
                        <p class="text-slate-400 text-base md:text-lg font-medium leading-relaxed">
                            Engineered for modern space optimization. This unit features our proprietary storage system, blending industrial-grade durability with children-friendly aesthetics.
                        </p>
                        <div class="pt-4">
                            <a href="${f['链接'] || '#'}" target="_blank" class="buy-btn uppercase tracking-widest">
                                Discover More →
                            </a>
                        </div>
                    </div>
                </section>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            new Typed('#typed', { 
                strings: isEn ? ['Future.', 'Intelligence.', 'Space.'] : ['未来.', '智能.', '空间.'], 
                typeSpeed: 60, loop: true
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('v_lang', currentLang);
            location.reload(); 
        }

        window.onload = init;
    </script>
</body>
</html>
