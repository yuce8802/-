<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Brand Totem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; background: #FFFFFF; -webkit-tap-highlight-color: transparent; color: #0f172a; overflow-x: hidden; }
        
        /* 💡 核心改动：全屏图腾 Logo 样式 */
        .totem-logo {
            /* 巨大化：占据屏幕高度的 60%，宽度自动适配 */
            height: 60vh; 
            width: auto;
            margin: 0 auto; 
            display: block;
            object-contain: contain;
            /* 增加深度阴影和微光 */
            box-shadow: 0 50px 100px rgba(37, 99, 235, 0.1);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .totem-logo:hover { transform: scale(1.02) translateY(-10px); box-shadow: 0 80px 150px rgba(37, 99, 235, 0.15); }

        /* 💡 悬浮导航条（毛玻璃质感） */
        .floating-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 99px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .detail-section {
            border-bottom: 1px solid #f8fafc;
            padding: 8rem 0;
        }

        .buy-btn {
            background: #2563eb; color: white;
            padding: 1.1rem 2.5rem; border-radius: 99px;
            font-weight: 800; font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex; align-items: center;
        }
        .buy-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(37, 99, 235, 0.25); }
    </style>
</head>
<body>

    <div id="adminPanel" class="fixed inset-0 bg-white/99 backdrop-blur-3xl z-[9999] hidden items-center justify-center" onclick="this.style.display='none'">
        <div class="p-16 text-center" onclick="event.stopPropagation()">
            <h2 class="text-[11px] font-black text-blue-600 mb-12 tracking-[0.4em] uppercase">VortinT intelligence Protocol</h2>
            <div class="flex space-x-20 mb-16">
                <div><p class="text-[11px] text-slate-400 font-bold mb-3">TRAFFIC_STREAM</p><p id="vCount" class="text-7xl font-black">0</p></div>
                <div><p class="text-[11px] text-slate-400 font-bold mb-3">UNIT_OBJECTS</p><p id="pCount" class="text-7xl font-black">0</p></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] font-black text-slate-300 hover:text-red-500 transition-colors tracking-widest uppercase border border-slate-100 px-8 py-3 rounded-full">Reset_Core_Data</button>
        </div>
    </div>

    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[90vw] max-w-5xl floating-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <button onclick="toggleLang()" class="text-[10px] font-bold text-slate-400 hover:text-blue-600 transition-colors uppercase px-3">EN/中</button>
        </div>
        <div class="flex items-center space-x-2.5">
            <a href="mailto:gd@vortexd.com" class="bg-slate-50 text-slate-500 px-5 py-2.5 rounded-full font-bold text-[10px] uppercase hover:bg-slate-100 transition-all">GD Support</a>
            <a href="mailto:cs@vortexd.com" class="bg-blue-600 text-white px-5 py-2.5 rounded-full font-bold text-[10px] uppercase shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all">CS Support</a>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6">
        
        <header class="pt-32 pb-16 text-center cursor-pointer" onclick="handleLogoClick()">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 class="totem-logo rounded-full active:scale-95 shadow-blue-100">
            <p class="text-sm text-slate-400 font-bold mt-12 tracking-widest uppercase">Empowering <span id="typed" class="text-blue-600"></span></p>
        </header>

        <section class="mb-16 rounded-[3rem] overflow-hidden bg-slate-100 shadow-2xl border-8 border-slate-50">
            <div class="aspect-video w-full">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls></video>
            </div>
        </section>

        <div id="product-list" class="divide-y divide-slate-50"></div>
    </main>

    <footer class="py-24 text-center">
        <p class="text-slate-200 text-[10px] font-bold tracking-[0.5em] uppercase">VortinT Studios © 2026</p>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const RAW_VIDEO = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";

        let allProducts = []; let currentLang = localStorage.getItem('v_lang') || 'en';
        let logoClicks = 0;

        async function init() {
            document.getElementById('brandVideo').src = RAW_VIDEO;
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    updateContent();
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_total') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_total', v);
                }
            } catch (e) { console.error(e); }
        }

        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        function renderUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                return `
                <section class="detail-section flex flex-col md:flex-row gap-20 items-center">
                    <div class="w-full md:w-1/2">
                        <img src="${img.replace("http://", "https://")}" class="w-full rounded-[2.5rem] shadow-xl hover:shadow-2xl transition-all duration-500 hover:-translate-y-2">
                    </div>
                    <div class="w-full md:w-1/2 space-y-6">
                        <h2 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight leading-tight">${f['标题'] || 'Design Intelligence'}</h2>
                        <p class="text-slate-400 text-base md:text-lg font-medium leading-relaxed">
                            Engineered for modern space optimization. This unit features our proprietary storage system.
                        </p>
                        <div class="pt-5">
                            <a href="${f['链接'] || '#'}" target="_blank" class="buy-btn uppercase tracking-widest">Discover →</a>
                        </div>
                    </div>
                </section>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            new Typed('#typed', { 
                strings: isEn ? ['Future.', 'Intelligence.', 'Space.'] : ['未来.', '智能.', '空间.'], 
                typeSpeed: 60, loop: true
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('v_lang', currentLang);
            location.reload(); 
        }
        window.onload = init;
    </script>
</body>
</html>
