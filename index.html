<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Brand Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; background: #FFFFFF; -webkit-tap-highlight-color: transparent; color: #0f172a; }
        
        /* 品牌大标题 */
        .hero-title {
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.8; letter-spacing: -0.05em;
            background: linear-gradient(180deg, #1e293b 0%, #334155 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 详情化产品卡片 */
        .detail-section {
            border-bottom: 1px solid #f1f5f9;
            padding: 5rem 0;
        }

        .buy-btn {
            background: #2563eb; color: white;
            padding: 1.2rem 2.5rem; border-radius: 99px;
            font-weight: 800; font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .buy-btn:hover { transform: scale(1.05); box-shadow: 0 20px 40px rgba(37, 99, 235, 0.2); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 8px 20px; border-radius: 99px; font-size: 10px; opacity: 0; transition: 0.3s; z-index: 9999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">SYSTEM READY</div>

    <div id="adminPanel" class="fixed inset-0 bg-white/95 backdrop-blur-xl z-[9999] hidden items-center justify-center" onclick="this.style.display='none'">
        <div class="p-12 text-center" onclick="event.stopPropagation()">
            <h2 class="text-[10px] font-bold text-slate-400 mb-8 tracking-widest uppercase">Console</h2>
            <div class="flex space-x-12 mb-12">
                <div><p class="text-[10px] text-slate-400">TRAFFIC</p><p id="vCount" class="text-4xl font-black">0</p></div>
                <div><p class="text-[10px] text-slate-400">ITEMS</p><p id="pCount" class="text-4xl font-black">0</p></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] font-bold text-red-500 border border-red-100 px-6 py-2 rounded-full">RESET SYSTEM</button>
        </div>
    </div>

    <nav class="sticky top-0 z-[100] bg-white/80 backdrop-blur-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="handleLogoClick()">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 class="h-12 w-12 object-contain rounded-full border border-slate-100 shadow-sm">
            <span class="text-sm font-black tracking-tighter text-slate-400 uppercase">VortinT</span>
        </div>
        <div class="flex items-center space-x-2 md:space-x-3">
            <button onclick="toggleLang()" class="text-[9px] font-bold text-slate-300 mr-2">EN/中</button>
            <a href="mailto:gd@vortexd.com" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full font-bold text-[10px] uppercase hover:bg-slate-200 transition-colors">GD Support</a>
            <a href="mailto:cs@vortexd.com" class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold text-[10px] uppercase shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-colors">CS Support</a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-24 pb-12">
        <h1 class="hero-title font-black uppercase">VORTINT</h1>
        <p class="text-lg text-slate-400 font-bold mt-8 italic">Empowering <span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <section class="mb-20 rounded-[3rem] overflow-hidden bg-slate-50 relative group">
            <div class="aspect-video w-full">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls></video>
            </div>
        </section>

        <div id="product-list" class="space-y-4">
            </div>
    </main>

    <footer class="py-20 text-center text-slate-200 text-[9px] font-bold tracking-[0.5em] uppercase">
        © 2026 VortinT Labs / vortexd.com
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const RAW_VIDEO = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";

        let allProducts = []; let currentLang = localStorage.getItem('v_lang') || 'en';
        let logoClicks = 0;

        async function init() {
            document.getElementById('brandVideo').src = RAW_VIDEO;
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    updateContent();
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_total') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_total', v);
                }
            } catch (e) { console.error(e); }
        }

        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        // 首页直接展示详情的核心渲染逻辑
        function renderUI() {
            const list = document.getElementById('product-list');
            list.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                return `
                <section class="detail-section flex flex-col md:flex-row gap-12 items-center">
                    <div class="w-full md:w-1/2">
                        <img src="${img.replace("http://", "https://")}" class="w-full rounded-[2.5rem] shadow-2xl">
                    </div>
                    <div class="w-full md:w-1/2 space-y-6 text-center md:text-left">
                        <h2 class="text-3xl md:text-5xl font-black leading-tight text-slate-800">${f['标题'] || 'VortinT Special Edition'}</h2>
                        <div class="h-1 w-20 bg-blue-600 mx-auto md:mx-0"></div>
                        <p class="text-slate-500 text-lg font-medium leading-relaxed">
                            Discover the genius perception of storage. Designed for high-end families, featuring our signature elastic cord system and premium wooden finishes.
                        </p>
                        <div class="pt-6">
                            <a href="${f['链接'] || '#'}" target="_blank" class="buy-btn">
                                INITIALIZE DISCOVERY →
                            </a>
                        </div>
                    </div>
                </section>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            new Typed('#typed', { 
                strings: isEn ? ['Future.', 'Organization.', 'Design.'] : ['未来.', '组织.', '设计.'], 
                typeSpeed: 60, loop: true
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('v_lang', currentLang);
            location.reload(); 
        }

        window.onload = init;
    </script>
</body>
</html>
