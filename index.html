<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | 智能儿童成长空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+SC:wght@500;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FAFAFA; }
        .hero-gradient { background: linear-gradient(to r, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-gray-100 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="h-8 w-auto">
            <a href="https://docs.google.com/spreadsheets/d/1N58RVAfXQdnp2_5OqFTRFDq-5HTyPFYLYk53httoGVQ/edit" target="_blank" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Edit Table</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20">
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter leading-tight">Smart Space <br><span class="hero-gradient italic">For Kids.</span></h1>
        <p class="mt-6 text-lg text-gray-400">专注于 <span id="typed" class="text-black font-bold border-b-4 border-blue-500"></span></p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="loading" class="text-center py-20 text-gray-300 animate-pulse font-bold uppercase tracking-widest">Loading Collection...</div>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <script>
        // 使用 OpenSheet 中转，解决国内访问 Google 的问题
        const SHEET_ID = "1N58RVAfXQdnp2_5OqFTRFDq-5HTyPFYLYk53httoGVQ";
        const TAB_NAME = "Sheet1"; // 如果你的表格页签改名了，请同步修改这里
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${TAB_NAME}`;

        new Typed('#typed', {
            strings: ['毛绒玩具收纳.', '儿童阅读空间.', '垂直弹力绳设计.'],
            typeSpeed: 60, loop: true
        });

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL);
                const products = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderProducts(products);
            } catch (e) {
                document.getElementById('loading').innerText = "表格加载失败，请确保表格已开启'任何人可查看'。";
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <a href="${p.link || '#'}" target="_blank" class="group bg-white rounded-[2.5rem] p-4 shadow-sm hover:shadow-2xl transition-all block">
                    <div class="aspect-[4/5] overflow-hidden rounded-[2rem] bg-gray-100 mb-6">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="px-2 pb-2">
                        <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                        <p class="text-blue-600 font-black text-[10px] mt-2 uppercase tracking-widest">Shop on Amazon →</p>
                    </div>
                </a>
            `).join('');
        }

        fetchProducts();
    </script>
</body>
</html>
