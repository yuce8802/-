<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FDFBF7; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #1d4ed8, 0 2px 0 #1e40af, 0 3px 0 #1e3a8a, 0 4px 0 #172554, 0 10px 20px rgba(37,99,235,.2);
        }

        /* 视频播放栏样式 */
        .video-section {
            background: #FFFFFF; border-radius: 2.5rem;
            border: 1px solid rgba(183, 153, 123, 0.1);
            box-shadow: 0 20px 40px rgba(183, 153, 123, 0.1);
            overflow: hidden; margin-bottom: 4rem;
        }

        /* 3D 卡片与浮起动效 */
        .product-card { 
            background: white; border-radius: 2rem; padding: 1rem;
            box-shadow: 0 10px 25px rgba(183, 153, 123, 0.1);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, box-shadow; transform-style: preserve-3d;
        }

        .product-card:hover {
            transform: translateY(-20px) translateZ(120px) scale(1.05) !important;
            box-shadow: 0 40px 80px rgba(183, 153, 123, 0.25);
            z-index: 999 !important;
        }

        #product-grid { position: relative; transition: all 0.8s ease; transform-style: preserve-3d; min-height: 500px; }
        .mode-stack { display: flex !important; flex-direction: column; align-items: center; perspective: 2000px; padding-top: 80px; }
        .mode-stack .product-card { width: 85vw; max-width: 360px; margin-top: -140px; transform: rotateX(25deg) translateZ(calc(var(--idx) * 5px)); }
        .mode-ring { display: block !important; height: 550px; perspective: 1200px; animation: rotateRing 25s linear infinite; }
        .mode-ring .product-card { position: absolute; left: 50%; top: 50%; width: 160px; margin-left: -80px; margin-top: -80px; transform: rotateY(var(--ry)) translateZ(280px); backface-visibility: hidden; }
        @keyframes rotateRing { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* Logo 进度条 */
        .press-ring { position: absolute; inset: -4px; border: 4px solid #2563eb; border-radius: 16px; clip-path: inset(0 100% 0 0); transition: clip-path 0.8s linear; }
        .pressing .press-ring { clip-path: inset(0 0 0 0); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2563eb; color: white; padding: 10px 24px; border-radius: 99px; font-weight: 900; opacity: 0; transition: 0.3s; z-index: 2000; }
        #toast.show { opacity: 1; top: 40px; }
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toast">MODE SWITCHED</div>

    <div id="adminPanel" class="admin-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[2.5rem] w-64 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xs font-black uppercase text-blue-600 mb-4 italic">Dashboard</h2>
            <div class="space-y-3">
                <div class="flex justify-between border-b pb-1"><span class="text-gray-400 text-[10px]">VISITS</span><span id="vCount" class="font-black">0</span></div>
                <div class="flex justify-between border-b pb-1"><span class="text-gray-400 text-[10px]">ITEMS</span><span id="pCount" class="font-black">0</span></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="mt-4 w-full py-2 bg-red-50 text-red-500 rounded-lg text-[10px] font-bold">RESET DATA</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/60 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-orange-50">
        <div id="logoWrapper" class="relative">
            <div class="press-ring"></div>
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 onclick="handleLogoClick()" class="h-10 rounded-lg cursor-pointer select-none active:scale-90 transition-transform">
        </div>
        <div class="flex space-x-2">
            <button onclick="toggleLang()" class="bg-black/5 px-4 py-2 rounded-full font-black text-[10px] uppercase">EN/中</button>
            <button onclick="copyEmail()" class="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-blue-500/30">Email</button>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16 text-center md:text-left">
        <h1 class="text-7xl md:text-9xl font-black uppercase glow-3d leading-none">Smart Space</h1>
        <h1 id="tagline" class="text-4xl md:text-7xl font-black italic text-gray-800 mt-2">For Kids.</h1>
        <p class="text-lg text-gray-400 font-bold mt-4 tracking-tight">Focusing on <span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        
        <section class="max-w-4xl mx-auto video-section p-2 md:p-4">
            <div class="aspect-video w-full rounded-[1.8rem] overflow-hidden bg-gray-100 relative shadow-inner">
                <video id="brandVideo" class="w-full h-full object-cover" controls autoplay muted loop playsinline>
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>
            <div class="px-6 py-4 flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-black text-gray-800 uppercase tracking-tighter">Brand Showreel</h2>
                    <p class="text-[9px] text-gray-400 font-bold uppercase">Dynamic Storage Solutions</p>
                </div>
                <span class="text-[9px] font-black text-blue-600 uppercase flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-600 animate-ping mr-2"></span> LIVE
                </span>
            </div>
        </section>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10">
            <div id="loading" class="col-span-full text-center py-20 font-black text-gray-300 animate-pulse">CONNECTING TO VIKA...</div>
        </div>
    </main>

    <footer class="py-24 text-center">
        <button onclick="copyEmail()" class="text-xs font-black text-gray-300 tracking-[0.2em] hover:text-blue-600 transition-colors uppercase">contact@vortexd.com</button>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        let viewMode = 0; let currentLang = localStorage.getItem('vortint_lang') || 'en';
        let allProducts = []; let pressTimer; let logoClicks = 0;

        const logo = document.getElementById('logoWrapper');
        const startPress = () => {
            logo.classList.add('pressing');
            pressTimer = setTimeout(() => {
                viewMode = (viewMode + 1) % 3;
                if(navigator.vibrate) navigator.vibrate(50);
                renderUI();
                logo.classList.remove('pressing');
                showToast(["GRID", "STACK", "RING"][viewMode] + " MODE");
            }, 800);
        };
        const endPress = () => { clearTimeout(pressTimer); logo.classList.remove('pressing'); };
        logo.onmousedown = startPress; logo.ontouchstart = startPress;
        logo.onmouseup = endPress; logo.ontouchend = endPress;

        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        async function fetchProducts() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const res = await response.json();
                if (res.success) {
                    allProducts = res.data.records;
                    
                    // 💡 重点：动态加载视频链接
                    // 查找第一条有视频链接记录的数据
                    const videoData = allProducts.find(r => r.fields['视频链接']);
                    if (videoData) {
                        const videoUrl = videoData.fields['视频链接'];
                        const videoTag = document.getElementById('brandVideo');
                        const sourceTag = document.getElementById('videoSource');
                        sourceTag.src = videoUrl;
                        videoTag.load(); // 强制视频重新加载新链接
                    }

                    updateContent();
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_count') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_count', v);
                }
            } catch (e) { console.error(e); }
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            grid.className = viewMode === 0 ? "grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10" : 
                             viewMode === 1 ? "mode-stack" : "mode-ring";

            grid.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = f['图片'] || "";
                if (Array.isArray(img)) img = img[0].url;
                img = img.replace("http://", "https://");
                const angle = (360 / allProducts.length) * i;
                
                return `
                <div class="product-card" style="--idx: ${i}; --ry: ${angle}deg; z-index: ${i};">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-4 pointer-events-none">
                    <h3 class="text-[11px] font-black line-clamp-2 h-10 mb-2 leading-tight text-gray-800 opacity-90">${f['标题'] || 'Product'}</h3>
                    <a href="${f['链接'] || '#'}" target="_blank" class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Explore →</a>
                </div>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            document.getElementById('tagline').innerText = isEn ? "For Kids." : "为了孩子.";
            new Typed('#typed', { 
                strings: isEn ? ['Toy Storage.', 'Reading Spaces.', 'Tidy Habits.'] : ['玩具收纳.', '空间美学.', '好习惯养成.'], 
                typeSpeed: 50, loop: true, destroy: true
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            location.reload(); 
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => showToast("EMAIL COPIED"));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
