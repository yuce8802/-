<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        // 🆘 手机端报错捕获器：如果有错，直接弹窗
        window.onerror = function(msg, url, line) {
            alert("Error: " + msg + "\nLine: " + line);
            return false;
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; -webkit-tap-highlight-color: transparent; }
        .hero-gradient { background: linear-gradient(to r, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="h-8 w-auto rounded">
        <button onclick="toggleLang()" class="text-[10px] font-black border-2 border-black px-3 py-1 rounded-full uppercase">EN/ZH</button>
    </nav>

    <div class="px-6 py-12 text-center">
        <h1 class="text-4xl font-black tracking-tighter mb-4 uppercase">Smart Space <br><span class="hero-gradient italic">For Kids.</span></h1>
        <p id="typed-box" class="text-gray-400 font-bold text-sm">Focusing on <span id="typed" class="text-black"></span></p>
    </div>

    <main class="px-4 pb-20">
        <div id="loading" class="text-center py-10 text-gray-300 font-black animate-pulse">CONNECTING...</div>
        <div id="product-grid" class="grid grid-cols-1 gap-6"></div>
    </main>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        let currentLang = localStorage.getItem('vortint_lang') || 'en';

        const i18n = {
            zh: { typed: ['毛绒玩具收纳.', '儿童阅读空间.'], btn: "立即购买" },
            en: { typed: ['Plush Toy Storage.', 'Reading Spaces.'], btn: "Shop Now" }
        };

        async function fetchProducts() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const result = await response.json();
                if (result.success) {
                    renderUI(result.data.records);
                } else {
                    alert("API Error: " + result.message);
                }
            } catch (e) {
                alert("Network Fail: 无法连接维格表 API");
            }
        }

        function renderUI(records) {
            document.getElementById('loading').style.display = 'none';
            const grid = document.getElementById('product-grid');
            grid.innerHTML = records.map(r => {
                const f = r.fields;
                const img = Array.isArray(f.图片) ? f.图片[0].url : (f.图片 || "");
                return `
                <div class="bg-white rounded-3xl p-4 shadow-sm border border-gray-100">
                    <img src="${img.replace('http://', 'https://')}" class="w-full aspect-square object-cover rounded-2xl mb-4">
                    <h3 class="font-black text-lg mb-2">${f.标题 || 'Item'}</h3>
                    <a href="${f.链接 || '#'}" class="text-blue-600 font-black text-xs uppercase">${i18n[currentLang].btn} →</a>
                </div>`;
            }).join('');
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            location.reload(); // 手机端最稳妥的刷新方式
        }

        window.onload = () => {
            new Typed('#typed', { strings: i18n[currentLang].typed, typeSpeed: 50, loop: true });
            fetchProducts();
        };
    </script>
</body>
</html>
