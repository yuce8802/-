<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FAFAFA; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* 3D立体文字 */
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #1d4ed8, 0 2px 0 #1e40af, 0 3px 0 #1e3a8a, 0 4px 0 #172554, 0 5px 0 #0f172a, 0 10px 20px rgba(37,99,235,.2);
        }

        /* 💡 堆叠模式核心 CSS (Apple Style Stack) */
        .mode-stack {
            display: flex !important;
            flex-direction: column;
            align-items: center;
            perspective: 1000px;
            padding-bottom: 200px;
        }
        .mode-stack .product-card {
            width: 85vw;
            max-width: 400px;
            margin-bottom: -120px; /* 产生堆叠重叠感 */
            transform: rotateX(15deg) scale(0.9);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            z-index: 1;
        }
        .mode-stack .product-card:hover {
            transform: rotateX(0deg) scale(1) translateY(-20px);
            margin-bottom: 20px;
            z-index: 50;
        }

        /* 复制提示 */
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: #2563eb; color: white; padding: 16px 32px; border-radius: 99px; font-weight: 900; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2000; }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="toast">EMAIL COPIED</div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-end items-center space-x-4">
            <div id="logoWrapper" class="relative group">
                <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                     class="h-12 md:h-16 w-auto rounded-xl cursor-pointer active:scale-90 transition-transform select-none">
            </div>
            
            <div class="flex items-center space-x-2">
                <button onclick="toggleLang()" class="border-[1.5px] border-black px-3 py-1.5 rounded-full text-[10px] font-black uppercase">EN/中</button>
                <button onclick="copyEmail()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">Email</button>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16 text-center md:text-left">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase glow-3d">Smart Space</h1>
        <h1 class="text-4xl md:text-7xl font-black italic text-gray-900 mt-2 opacity-90">For Kids.</h1>
        <p class="text-lg text-gray-400 font-bold mt-4">Focusing on <span id="typed" class="text-black"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8 transition-all duration-700">
            </div>
    </main>

    <footer class="py-20 text-center">
        <button onclick="copyEmail()" class="text-sm font-black text-blue-600 border-b-2 border-blue-100">contact@vortexd.com</button>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        let isStackMode = false;
        let pressTimer;

        function vib(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

        // 💡 核心逻辑：长按切换布局
        const logo = document.getElementById('logoWrapper');
        
        const startPress = () => {
            pressTimer = setTimeout(() => {
                isStackMode = !isStackMode;
                vib([100, 50, 100]); // 切换时的特殊震动
                renderUI();
                // 提示用户
                const t = document.getElementById('toast');
                t.innerText = isStackMode ? "STACK MODE ON" : "GRID MODE ON";
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 1000);
            }, 800); // 0.8秒判定为长按
        };

        const cancelPress = () => clearTimeout(pressTimer);

        logo.addEventListener('mousedown', startPress);
        logo.addEventListener('touchstart', startPress);
        logo.addEventListener('mouseup', cancelPress);
        logo.addEventListener('mouseleave', cancelPress);
        logo.addEventListener('touchend', cancelPress);

        async function fetchProducts() {
            const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
            });
            const result = await response.json();
            if (result.success) {
                window.allProducts = result.data.records;
                renderUI();
            }
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            
            // 切换布局类名
            if (isStackMode) {
                grid.className = "mode-stack";
            } else {
                grid.className = "grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8";
            }

            grid.innerHTML = window.allProducts.map((r, i) => {
                const f = r.fields;
                const img = (Array.isArray(f.图片) ? f.图片[0].url : f.图片).replace("http://", "https://");
                return `
                <div class="product-card bg-white rounded-[1.5rem] p-3 shadow-md border border-gray-50 text-left" style="z-index: ${i}">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[1rem] mb-3">
                    <h3 class="text-xs font-black line-clamp-1 mb-1">${f.标题 || 'Item'}</h3>
                    <a href="${f.链接}" target="_blank" class="text-[8px] font-black text-blue-600">VIEW →</a>
                </div>`;
            }).join('');
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => {
                vib(50);
                const t = document.getElementById('toast');
                t.innerText = "EMAIL COPIED";
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            });
        }

        window.onload = () => {
            new Typed('#typed', { 
                strings: ['Plush Toy Storage.', 'Smart Reading Spaces.'], 
                typeSpeed: 50, loop: true 
            });
            fetchProducts();
        };
    </script>
</body>
</html>
