<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #fff; color: #0f172a; }
        
        /* 1.5s 进度条 */
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #2563eb; width: 0%; }
        .modal-show .progress-bar { width: 100%; transition: width 1.5s linear; }

        #detail-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 2rem; transform: scale(0.9); opacity: 0; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .modal-show .modal-content { transform: scale(1); opacity: 1; }
        
        /* 隐藏入口动画 */
        .logo-active { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50/30">

    <div id="splash" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center transition-opacity duration-700">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="w-20 h-20 rounded-full animate-bounce">
    </div>

    <div id="detail-modal" onclick="closeDetail()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="progress-bar" id="p-bar"></div>
            <img id="m-img" src="" class="w-full aspect-square object-cover">
            <div class="p-8 text-center">
                <h2 id="m-title" class="text-xl font-bold mb-6 text-slate-800"></h2>
                <a id="m-link" href="#" class="block w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-xl shadow-blue-100">Connecting...</a>
            </div>
        </div>
    </div>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-100 w-[92vw] max-w-5xl bg-white/80 backdrop-blur-xl border border-white rounded-full px-6 py-3 flex justify-between items-center shadow-sm">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
             onclick="adminGate()" class="h-8 w-8 rounded-full cursor-pointer transition-transform active:scale-90" id="brand-logo">
        <span class="text-[10px] font-bold tracking-[0.3em] text-slate-400 uppercase">VortinT Smart Space</span>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pt-28 pb-20">
        <section class="mb-12 rounded-[2.5rem] overflow-hidden shadow-2xl bg-black aspect-video relative">
            <video id="v-player" class="w-full h-full object-cover" autoplay muted loop playsinline></video>
            <div class="absolute bottom-6 left-8">
                <p class="text-white/60 text-[9px] font-bold tracking-widest uppercase mb-1">Live Gallery</p>
                <h1 id="typed" class="text-white text-2xl font-bold"></h1>
            </div>
        </section>

        <div id="p-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8">
            <div class="aspect-square bg-slate-200 animate-pulse rounded-3xl"></div>
            <div class="aspect-square bg-slate-200 animate-pulse rounded-3xl"></div>
        </div>
    </main>

    <script>
        const CONFIG = { TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", SHEET: "dstUcVqARey53sJnMh", DEFAULT_V: "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4" };
        let products = [], timer = null, clicks = 0;

        async function start() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CONFIG.SHEET}/records`, { headers: { 'Authorization': `Bearer ${CONFIG.TOKEN}` } });
                const { data } = await res.json();
                
                // 1. 分离视频配置与商品
                const videoData = data.records.find(r => r.fields['标题'] === 'GLOBAL_VIDEO');
                products = data.records.filter(r => r.fields['标题'] !== 'GLOBAL_VIDEO');

                // 2. 更新视频
                document.getElementById('v-player').src = videoData ? videoData.fields['链接'] : CONFIG.DEFAULT_V;

                // 3. 渲染 UI
                render();
                new Typed('#typed', { strings: ['The Elastic Cord Solution.', 'Modern Toy Storage.', 'VortinT Innovation.'], typeSpeed: 50, loop: true });
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').remove(), 700);
            } catch (e) { alert("Network Busy"); }
        }

        function render() {
            const grid = document.getElementById('p-grid');
            grid.innerHTML = products.map((p, i) => {
                const f = p.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : "";
                return `<div class="bg-white p-2 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all cursor-pointer" onclick="openP(${i})">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-3">
                    <h3 class="text-[11px] font-bold px-2 truncate text-slate-700">${f['标题'] || 'Unit'}</h3>
                </div>`;
            }).join('');
        }

        function openP(i) {
            const f = products[i].fields;
            document.getElementById('m-img').src = Array.isArray(f['图片']) ? f['图片'][0].url : "";
            document.getElementById('m-title').innerText = f['标题'];
            document.getElementById('m-link').href = f['链接'];
            
            const modal = document.getElementById('detail-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('modal-show'), 10);

            timer = setTimeout(() => {
                if (modal.classList.contains('modal-show')) window.location.href = f['链接'];
            }, 1500);
        }

        function closeDetail() {
            clearTimeout(timer);
            document.getElementById('detail-modal').classList.remove('modal-show');
            setTimeout(() => document.getElementById('detail-modal').style.display = 'none', 300);
        }

        function adminGate() {
            clicks++;
            document.getElementById('brand-logo').classList.add('logo-active');
            if(clicks >= 5) window.location.href = 'admin.html';
            setTimeout(() => { clicks = 0; document.getElementById('brand-logo').classList.remove('logo-active'); }, 2000);
        }

        window.onload = start;
    </script>
</body>
</html>
