<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; }
        
        /* 保留你的弹窗与进度条样式 */
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #2563eb; width: 0%; }
        .modal-show .progress-bar { width: 100%; transition: width 1.5s linear; }
        #detail-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 2rem; transform: scale(0.9); opacity: 0; transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .modal-show .modal-content { transform: scale(1); opacity: 1; }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0; background: transparent; }
        .filter-btn.active { background: #000; color: #fff; border-color: #000; }
        
        /* 视频容器 */
        .video-container { position: relative; width: 100%; height: 70vh; background: #000; border-radius: 0 0 3rem 3rem; overflow: hidden; }
    </style>
</head>
<body class="bg-blue-50/20">

    <div id="splash" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center transition-opacity duration-700">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <h2 class="text-xl font-black tracking-tighter">VortinT Loading...</h2>
        </div>
    </div>

    <section class="video-container">
        <video id="hero-video" autoplay muted loop playsinline class="w-full h-full object-cover opacity-60"></video>
        <div class="absolute inset-0 flex flex-col items-center justify-center text-white text-center px-6">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter mb-4 uppercase">VortinT</h1>
            <div class="text-xl md:text-2xl font-bold opacity-90 h-8">
                <span id="typed"></span>
            </div>
        </div>
    </section>

    <nav class="sticky top-0 z-[1000] bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col gap-4">
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Explore:</span>
                <div id="filter-bar" class="flex gap-2 overflow-x-auto no-scrollbar">
                    <button onclick="setFilter('全部')" class="filter-btn active whitespace-nowrap px-6 py-2 rounded-full border border-slate-200 text-xs font-bold transition-all">全部</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="detail-modal">
        <div class="modal-content shadow-2xl">
            <div class="progress-bar"></div>
            <div class="p-8">
                <h3 id="modal-title" class="text-3xl font-black mb-4 tracking-tighter"></h3>
                <p class="text-slate-500 leading-relaxed mb-8">您选择的产品详情已准备就绪。VortinT 为您提供全球领先的智能空间解决方案。</p>
                <div class="flex flex-col gap-3">
                    <a id="modal-link" href="#" target="_blank" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-center shadow-lg shadow-blue-100">前往 Amazon 购买</a>
                    <button onclick="closeModal()" class="w-full py-4 text-slate-400 font-bold text-sm">暂不购买</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CFG = { 
            TOKEN: "usk6WsQlH4X6ST2hQRk4vAz", 
            SHEET: "dstUcVqARey53sJnMh" 
        };

        let allData = [];
        let currentFilter = '全部';

        // 初始化数据
        async function init() {
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const json = await res.json();
                if(json.success) {
                    allData = json.data.records.sort((a, b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                    
                    // 1. 设置视频：取第一行的视频链接
                    if(allData[0].fields['视频链接']) {
                        document.getElementById('hero-video').src = allData[0].fields['视频链接'];
                    }

                    // 2. 隐藏启动动画
                    setTimeout(() => {
                        document.getElementById('splash').style.opacity = '0';
                        setTimeout(() => document.getElementById('splash').remove(), 700);
                        
                        // 3. 启动打字机
                        new Typed('#typed', {
                            strings: ['Smart Space Design.', 'Premium Collection.', 'Innovating Your Life.'],
                            typeSpeed: 60, backSpeed: 30, loop: true
                        });
                    }, 1000);

                    renderUI();
                }
            } catch (e) { console.error("API error"); }
        }

        // 渲染筛选按钮和商品
        function renderUI() {
            const cats = ['全部', ...new Set(allData.map(i => i.fields['分类']).filter(Boolean))];
            document.getElementById('filter-bar').innerHTML = cats.map(c => `
                <button onclick="setFilter('${c}')" class="filter-btn ${currentFilter === c ? 'active' : ''} whitespace-nowrap px-6 py-2 rounded-full border border-slate-200 text-xs font-bold transition-all hover:border-black">
                    ${c}
                </button>
            `).join('');

            const grid = document.getElementById('product-grid');
            const filtered = currentFilter === '全部' ? allData : allData.filter(i => i.fields['分类'] === currentFilter);

            grid.innerHTML = filtered.map(item => {
                const f = item.fields;
                return `
                <div class="group cursor-pointer" onclick="openModal('${f['标题']}', '${f['链接']}')">
                    <div class="aspect-[4/5] rounded-[2.5rem] overflow-hidden bg-slate-100 mb-6">
                        <img src="${f['图片'] || ''}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    </div>
                    <div class="px-2 flex justify-between items-end">
                        <div>
                            <p class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-1">${f['分类'] || 'Global'}</p>
                            <h3 class="text-xl font-black tracking-tight">${f['标题'] || 'Untitled'}</h3>
                        </div>
                        <div class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-colors">
                            →
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function setFilter(c) {
            currentFilter = c;
            renderUI();
        }

        // 弹窗逻辑
        function openModal(title, link) {
            const modal = document.getElementById('detail-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-link').href = link || '#';
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('modal-show'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('modal-show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        init();
    </script>
</body>
</html>
