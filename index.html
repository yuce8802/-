<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+SC:wght@900&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FAFAFA; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 1px 0 #1d4ed8, 0 2px 0 #1e40af, 0 3px 0 #1e3a8a, 0 4px 0 #172554, 0 5px 0 #0f172a, 0 10px 20px rgba(37,99,235,.2);
        }

        #product-grid { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; min-height: 500px; position: relative; }
        .product-card { transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, opacity; }

        /* 模式 1: 堆叠 (Stack) */
        .mode-stack { display: flex !important; flex-direction: column; align-items: center; perspective: 2000px; padding-top: 50px; padding-bottom: 300px; }
        .mode-stack .product-card { width: 85vw; max-width: 380px; margin-bottom: -150px; transform: rotateX(25deg) scale(0.85); box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }

        /* 模式 2: 3D环形 (Ring) + 自动旋转 */
        .mode-ring { position: relative; height: 550px; display: block !important; perspective: 1000px; animation: rotateRing 20s linear infinite; }
        .mode-ring .product-card { 
            position: absolute; left: 50%; top: 50%; 
            width: 150px; margin-left: -75px; margin-top: -100px; 
            transform: rotateY(var(--ry)) translateZ(250px); /* 移动端减小半径 */
            backface-visibility: hidden;
        }
        @keyframes rotateRing { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        /* 触摸环形时暂停旋转 */
        .mode-ring:active { animation-play-state: paused; }

        .press-ring { position: absolute; inset: -4px; border: 4px solid #2563eb; border-radius: 16px; clip-path: inset(0 100% 0 0); transition: clip-path 0.8s linear; pointer-events: none; }
        .pressing .press-ring { clip-path: inset(0 0 0 0); }

        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: #2563eb; color: white; padding: 16px 32px; border-radius: 99px; font-weight: 900; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-blur: 10px; z-index: 999; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="toast">MODE SWITCHED</div>

    <div id="adminPanel" class="admin-modal" onclick="this.style.display='none'">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-xs w-full mx-auto shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-[10px] font-black uppercase tracking-widest text-blue-600 mb-6 italic">Internal Status</h2>
            <div class="space-y-4">
                <div class="flex justify-between border-b pb-2"><span class="text-gray-400 text-[10px] font-bold">VISITS</span><span id="visitCount" class="text-2xl font-black">0</span></div>
                <div class="flex justify-between border-b pb-2"><span class="text-gray-400 text-[10px] font-bold">ITEMS</span><span id="liveProducts" class="text-2xl font-black">0</span></div>
            </div>
            <button onclick="document.getElementById('adminPanel').style.display='none'" class="mt-6 w-full py-3 bg-black text-white rounded-xl text-[10px] font-black uppercase">Close</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-end items-center space-x-4">
            <div id="logoWrapper" class="relative">
                <div class="press-ring"></div>
                <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                     onclick="handleLogoClick()" class="h-12 md:h-16 w-auto rounded-xl cursor-pointer select-none">
            </div>
            <div class="flex items-center space-x-2">
                <button id="langBtn" onclick="toggleLang()" class="border-[1.5px] border-black px-3 py-1.5 rounded-full text-[10px] font-black">EN/中</button>
                <button onclick="copyEmail()" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase">Email</button>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16 text-center md:text-left">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase glow-3d">Smart Space</h1>
        <h1 id="tagline" class="text-4xl md:text-7xl font-black italic text-gray-900 mt-2 opacity-90">For Kids.</h1>
        <p class="text-lg text-gray-400 font-bold mt-4 tracking-tight">Focusing on <span id="typed" class="text-black"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4 overflow-visible">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8">
            <div id="loading" class="col-span-full text-center py-20 font-black text-gray-200 text-2xl animate-pulse">CONNECTING...</div>
        </div>
    </main>

    <footer class="py-24 text-center">
        <button onclick="copyEmail()" class="text-sm font-black text-blue-600 border-b-2 border-blue-100">contact@vortexd.com</button>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        
        let viewMode = 0; // 0: Grid, 1: Stack, 2: Ring
        let currentLang = localStorage.getItem('vortint_lang') || 'en';
        let allProducts = [];
        let pressTimer;
        let logoClicks = 0;
        let typedInstance;

        function vib(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

        function updateStats() {
            let visits = parseInt(localStorage.getItem('vortint_visits') || '0');
            visits++;
            localStorage.setItem('vortint_visits', visits);
            document.getElementById('visitCount').innerText = visits;
            document.getElementById('liveProducts').innerText = allProducts.length;
        }

        const logo = document.getElementById('logoWrapper');
        const startPress = () => {
            logo.classList.add('pressing');
            pressTimer = setTimeout(() => {
                viewMode = (viewMode + 1) % 3;
                vib([80, 40, 80]);
                renderUI();
                const modes = ["GRID", "STACK", "RING"];
                showToast(modes[viewMode] + " MODE");
                logo.classList.remove('pressing');
            }, 800);
        };
        const cancelPress = () => { clearTimeout(pressTimer); logo.classList.remove('pressing'); };

        logo.onmousedown = startPress; logo.ontouchstart = startPress;
        logo.onmouseup = cancelPress; logo.ontouchend = cancelPress;

        function handleLogoClick() {
            vib(10);
            logoClicks++;
            if (logoClicks === 5) {
                document.getElementById('adminPanel').style.display = 'flex';
                logoClicks = 0;
            }
            setTimeout(() => logoClicks = 0, 3000);
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            updateContent();
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            document.getElementById('tagline').innerText = isEn ? "For Kids." : "为了孩子.";
            document.getElementById('langBtn').innerText = isEn ? "EN / 中" : "中 / EN";
            if (typedInstance) typedInstance.destroy();
            typedInstance = new Typed('#typed', { 
                strings: isEn ? ['Toy Storage.', 'Reading Spaces.', 'Tidy Habits.'] : ['玩具收纳.', '儿童阅读空间.', '习惯养成.'], 
                typeSpeed: 50, loop: true 
            });
            renderUI();
        }

        async function fetchProducts() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const result = await response.json();
                if (result.success) {
                    allProducts = result.data.records;
                    updateStats();
                    updateContent();
                }
            } catch (e) { document.getElementById('loading').innerText = "NETWORK ERROR"; }
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            if (allProducts.length === 0) return;

            grid.className = viewMode === 0 ? "grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8" : 
                             viewMode === 1 ? "mode-stack" : "mode-ring";

            const count = allProducts.length;
            grid.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                const img = (Array.isArray(f.图片) ? f.图片[0].url : f.图片).replace("http://", "https://");
                const title = currentLang === 'zh' ? (f.中文标题 || f.标题) : f.标题;
                
                // 环形模式计算
                const angle = (360 / count) * i;
                const style = viewMode === 2 ? `--ry: ${angle}deg;` : '';

                return `
                <div class="product-card bg-white rounded-[1.2rem] p-3 shadow-md border border-gray-50 text-left" style="z-index: ${i}; ${style}">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[0.8rem] mb-3 pointer-events-none">
                    <h3 class="text-[10px] font-black line-clamp-2 h-8 mb-2 leading-tight text-gray-800">${title}</h3>
                    <a href="${f.链接}" target="_blank" onclick="vib(15)" class="text-[8px] font-black text-blue-600 uppercase">Explore →</a>
                </div>`;
            }).join('');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => {
                vib(40); showToast("COPIED");
            });
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
