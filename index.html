<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif; background: #F8FAFF; -webkit-tap-highlight-color: transparent; overflow-x: hidden; color: #1e293b; }
        
        .brand-gradient {
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 产品卡片：改为 Flex 布局以支持动态高度 */
        .product-card { 
            background: white; border-radius: 2.5rem; padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(148, 163, 184, 0.12);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.8);
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 40px 80px rgba(37, 99, 235, 0.12);
        }

        .tech-btn {
            background: #2563eb; color: white; text-align: center;
            padding: 1rem; border-radius: 1.25rem; font-weight: 800; font-size: 0.85rem;
            letter-spacing: 0.05em; transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
            margin-top: auto; /* 关键：将按钮推至底部 */
        }
        .tech-btn:active { transform: scale(0.96); }

        /* 3D 逻辑保留 */
        #product-grid { perspective: 2000px; transition: 0.8s; }
        .mode-stack .product-card { width: 90vw; max-width: 400px; margin-top: -160px; transform: rotateX(25deg); }
        .mode-ring .product-card { position: absolute; left: 50%; top: 50%; width: 200px; margin: -100px; transform: rotateY(var(--ry)) translateZ(320px); }
        @keyframes rotateRing { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .press-ring { position: absolute; inset: -4px; border: 4px solid #2563eb; border-radius: 18px; clip-path: inset(0 100% 0 0); transition: clip-path 0.8s linear; }
        .pressing .press-ring { clip-path: inset(0 0 0 0); }
        #toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 99px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 9999; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">MODE SWITCHED</div>

    <div id="adminPanel" class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl z-[9999] hidden items-center justify-center" onclick="this.style.display='none'">
        <div class="bg-white p-10 rounded-[3rem] w-80 shadow-2xl" onclick="event.stopPropagation()">
            <h2 class="text-xs font-black text-blue-600 mb-6 uppercase tracking-widest">Analytics</h2>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between border-b pb-2"><span class="text-slate-400 text-[10px]">VISITS</span><span id="vCount" class="font-bold">0</span></div>
                <div class="flex justify-between border-b pb-2"><span class="text-slate-400 text-[10px]">UNITS</span><span id="pCount" class="font-bold">0</span></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="w-full py-3 bg-red-50 text-red-500 rounded-2xl text-[10px] font-bold uppercase">Reset</button>
        </div>
    </div>

    <nav class="sticky top-0 z-[100] bg-white/70 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-blue-50">
        <div id="logoWrapper" class="relative">
            <div class="press-ring"></div>
            <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                 onclick="handleLogoClick()" class="h-10 rounded-xl cursor-pointer active:scale-95 transition-all select-none">
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="toggleLang()" class="bg-slate-100 px-4 py-2 rounded-full font-bold text-[10px] uppercase">EN/中</button>
            <a href="mailto:cs@vortexd.com" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-blue-500/30">CS Support</a>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16 text-center md:text-left">
        <h1 class="text-7xl md:text-9xl font-black uppercase brand-gradient leading-none">VortinT</h1>
        <p class="text-xl text-slate-400 font-bold mt-6 italic">Empowering <span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-7xl mx-auto px-4 pb-40">
        <section class="max-w-5xl mx-auto mb-20 bg-white rounded-[3rem] shadow-xl p-2 border border-blue-50 overflow-hidden">
            <div class="aspect-video w-full rounded-[2.2rem] overflow-hidden bg-slate-100 relative">
                <video id="brandVideo" class="w-full h-full object-cover" autoplay muted loop playsinline controls></video>
            </div>
        </section>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
            </div>
    </main>

    <footer class="py-24 text-center border-t border-blue-50">
        <a href="mailto:cs@vortexd.com" class="text-[11px] font-bold text-slate-300 tracking-[0.4em] hover:text-blue-600 transition-colors uppercase">cs@vortexd.com</a>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        const RAW_VIDEO = "https://res.cloudinary.com/dpr2pn5rs/video/upload/v1776075209/4%E6%9C%8813%E6%97%A5_1_iiorev.mp4";
        const LOW_VIDEO = RAW_VIDEO.replace("/upload/", "/upload/c_scale,w_480,q_auto:low,br_400k/");

        let allProducts = []; let viewMode = 0; let currentLang = localStorage.getItem('v_lang') || 'en';
        let logoClicks = 0; let pressTimer;

        function initVideo() {
            const v = document.getElementById('brandVideo');
            v.src = LOW_VIDEO;
            v.onplaying = () => {
                const preload = document.createElement('video');
                preload.src = RAW_VIDEO;
                preload.oncanplaythrough = () => {
                    const time = v.currentTime;
                    v.src = RAW_VIDEO; v.currentTime = time;
                    v.play(); v.onplaying = null;
                };
            };
        }

        async function init() {
            initVideo();
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const data = await res.json();
                if (data.success) {
                    allProducts = data.data.records;
                    updateContent();
                    document.getElementById('pCount').innerText = allProducts.length;
                    let v = (parseInt(localStorage.getItem('v_total') || 0) + 1);
                    document.getElementById('vCount').innerText = v;
                    localStorage.setItem('v_total', v);
                }
            } catch (e) { console.error(e); }
        }

        const logo = document.getElementById('logoWrapper');
        logo.onmousedown = logo.ontouchstart = () => {
            logo.classList.add('pressing');
            pressTimer = setTimeout(() => {
                viewMode = (viewMode + 1) % 3;
                renderUI();
                logo.classList.remove('pressing');
                showToast(["GRID", "STACK", "RING"][viewMode]);
            }, 800);
        };
        logo.onmouseup = logo.ontouchend = () => { clearTimeout(pressTimer); logo.classList.remove('pressing'); };

        function handleLogoClick() {
            logoClicks++;
            if(logoClicks === 5) { document.getElementById('adminPanel').style.display = 'flex'; logoClicks = 0; }
            setTimeout(() => logoClicks = 0, 3000);
        }

        // 修改重点：移除文字截断和固定高度
        function renderUI() {
            const grid = document.getElementById('product-grid');
            grid.className = viewMode === 0 ? "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12" : 
                             viewMode === 1 ? "mode-stack" : "mode-ring";
            
            grid.innerHTML = allProducts.map((r, i) => {
                const f = r.fields;
                let img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || "");
                return `
                <div class="product-card" style="--idx: ${i}; --ry: ${(360/allProducts.length)*i}deg; z-index: ${i};">
                    <img src="${img.replace("http://", "https://")}" class="w-full aspect-square object-cover rounded-[2rem] mb-6 pointer-events-none shadow-sm">
                    <h3 class="text-lg md:text-xl font-black text-slate-800 leading-snug mb-8 min-h-[3.5rem]">
                        ${f['标题'] || 'VortinT Unit'}
                    </h3>
                    <a href="${f['链接'] || '#'}" target="_blank" class="tech-btn uppercase">
                        Initialize Discovery →
                    </a>
                </div>`;
            }).join('');
        }

        function updateContent() {
            const isEn = currentLang === 'en';
            new Typed('#typed', { 
                strings: isEn ? ['Future Living.', 'Infinite Organization.', 'Genius Design.'] : ['未来生活.', '无限收纳.', '天才设计.'], 
                typeSpeed: 50, loop: true, destroy: true
            });
            renderUI();
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('v_lang', currentLang);
            location.reload(); 
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1500);
        }

        window.onload = init;
    </script>
</body>
</html>
