<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Official Smart Space</title>
    
    <link rel="icon" type="image/jpg" href="https://i.pinimg.com/736x/7d/fc/84/7dfc847a8c0c772b81ac5881a9f74558.jpg">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; background: #ffffff; color: #0f172a; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* 隐藏滚动条但允许滚动 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 商品卡片动画 */
        #p-grid { transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card { 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
            animation: cardEnter 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (hover: hover) {
            .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(37, 99, 235, 0.1); }
            .product-card:hover img { transform: scale(1.05); }
        }

        /* 导航栏与组件样式 */
        .glass-nav { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.08); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-hidden { transform: translateY(-100%); }

        .filter-btn { 
            border: 1px solid #e2e8f0; border-radius: 9999px; padding: 8px 20px; font-size: 10px; font-weight: 700; 
            text-transform: uppercase; transition: all 0.3s; color: #64748b; background: white; flex-shrink: 0;
        }
        .filter-btn.active { background: #2563eb; color: white; border-color: #2563eb; transform: scale(1.05); }

        .product-index { 
            position: absolute; top: 12px; left: 12px; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(4px); 
            color: white; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 8px; z-index: 10; 
        }

        /* 法律条款平滑展开 */
        .legal-content-box { 
            max-height: 0; overflow: hidden; opacity: 0; transition: all 0.5s ease;
            margin-top: 0; padding: 0 2rem; background: #f8fafc; border-radius: 1.5rem; 
            font-size: 11px; color: #64748b; line-height: 1.8; text-transform: uppercase; letter-spacing: 0.02em; 
        }
        .legal-content-box.show { 
            max-height: 500px; opacity: 1; padding: 2rem; margin-top: 2rem; border: 1px dashed #e2e8f0; 
        }
    </style>
</head>
<body class="bg-blue-50/10">

    <!-- 加载屏 -->
    <div id="splash" class="fixed inset-0 bg-white z-[9999] flex items-center justify-center transition-opacity duration-700">
        <div class="text-center">
            <div class="w-10 h-10 border-[3px] border-blue-600 border-t-transparent rounded-full animate-spin mb-4 mx-auto"></div>
            <p class="text-blue-600 font-bold tracking-[0.2em] animate-pulse text-[10px]">VortinT SYNCING</p>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav id="navbar" class="fixed top-0 w-full z-[100] glass-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <img src="https://i.pinimg.com/736x/7d/fc/84/7dfc847a8c0c772b81ac5881a9f74558.jpg" alt="Logo" class="h-9 w-9 rounded-full border-2 border-blue-500 object-cover shadow-sm">
            <span class="text-[14px] font-bold text-blue-900 tracking-tight" data-i18n="navTitle">VORTEX瑞航</span>
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="toggleLang()" class="bg-slate-100 hover:bg-blue-100 text-blue-600 font-black text-[9px] px-3 py-1.5 rounded-full border border-slate-200 transition-all uppercase">
                <span data-i18n="langBtn">EN / 中文</span>
            </button>
            <button onclick="window.open('https://wa.me/85269517551')" class="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-full shadow-lg active:scale-95 transition-all">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3 18.7-68.1-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6z"/></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pt-24 pb-10 min-h-[80vh]">
        <!-- 视频英雄区 -->
        <section class="mb-10 rounded-[2rem] overflow-hidden bg-slate-900 aspect-video relative shadow-2xl border-[4px] border-white flex items-center justify-center">
            <video id="v-player" class="w-full h-full object-cover hidden" autoplay muted loop playsinline></video>
            <!-- 视频加载失败的降级底图 -->
            <div id="v-fallback" class="absolute inset-0 bg-[url('https://i.pinimg.com/736x/8c/48/c9/8c48c9ce9552fa96c59238118f171bab.jpg')] bg-cover bg-center opacity-80"></div>
            
            <div class="absolute bottom-6 left-6 z-10">
                <h2 id="typed" class="text-white text-xl md:text-3xl font-black drop-shadow-xl italic tracking-tighter"></h2>
            </div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent pointer-events-none"></div>
        </section>

        <!-- 过滤器 (由 JS 动态渲染) -->
        <div id="filter-container" class="flex overflow-x-auto no-scrollbar justify-start md:justify-center gap-3 mb-10 pb-2 relative">
            <!-- 占位，防闪烁 -->
        </div>

        <!-- 无数据提示 -->
        <div id="empty-state" class="hidden text-center text-slate-400 text-xs font-bold tracking-widest py-10 uppercase">
            No objects found
        </div>

        <!-- 商品网格 -->
        <div id="p-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 mb-20"></div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-slate-100 pt-16 pb-12 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <div class="space-y-4">
                    <div class="flex items-center space-x-3">
                        <h4 class="text-blue-900 font-black text-xl italic">VortinT™</h4>
                        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1777012728/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260424143420_370_74_nicx1c.jpg" alt="Badge" class="h-8 object-contain">
                    </div>
                    <div class="text-slate-900 font-bold text-[9px] uppercase leading-relaxed tracking-wide">
                        <span data-i18n="coNameZh">瑞航（深圳）国际家居用品有限公司</span><br>
                        <span data-i18n="coAddr">深圳市龙岗区平湖街道上木古社区新木路328号1303</span><br>
                        <a href="mailto:cs@vortexd.com" class="text-blue-600 font-black border-b border-blue-600 mt-1 inline-block hover:text-blue-800 transition-colors">CS@VORTEXD.COM</a>
                    </div>
                </div>

                <div class="space-y-3">
                    <h5 data-i18n="legalTitle" class="text-slate-900 font-black text-[10px] uppercase tracking-[0.2em] mb-4">Legal</h5>
                    <ul class="text-[9px] text-slate-400 font-black uppercase space-y-2">
                        <li><button onclick="toggleLegal('privacy')" data-i18n="privacy" class="hover:text-blue-600 transition-colors">Privacy Policy</button></li>
                        <li><button onclick="toggleLegal('terms')" data-i18n="terms" class="hover:text-blue-600 transition-colors">Terms of Service</button></li>
                        <li><button onclick="toggleLegal('refund')" data-i18n="refund" class="hover:text-blue-600 transition-colors">Refund Policy</button></li>
                    </ul>
                </div>

                <div class="flex md:justify-end items-start">
                    <div class="inline-flex items-center space-x-3 bg-slate-50 border border-slate-100 px-4 py-2 rounded-2xl">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span>
                        <div class="flex flex-col">
                            <span id="visitor-count" class="text-blue-600 font-black text-sm tabular-nums">---</span>
                            <span data-i18n="visitors" class="text-[7px] text-slate-400 font-bold uppercase">Live Visitors</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 动态法律条款容器 -->
            <div id="legal-box" class="legal-content-box"></div>

            <p class="mt-16 text-[8px] text-slate-300 font-bold uppercase text-center tracking-[0.4em]">©VORTINT ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <script>
        // ⚠️ 警告: 生产环境中应将 TOKEN 放在后端服务器
        const CFG = { TOKEN: "uskSHurHAYSbDQBvTya8V2X", SHEET: "dstUcVqARey53sJnMh" };
        let allProducts =[];
        let currentLang = 'en';
        let currentFilterKey = 'all';

        // 配置驱动的分类映射
        const categoryFilters =[
            { key: 'all', en: 'ALL', zh: '全部' },
            { key: 'Softness', en: 'Softness', zh: '带毛绒' },
            { key: 'Reading', en: 'Reading', zh: '带书架' },
            { key: 'Diary', en: 'Visual Diary', zh: '带画板' },
            { key: 'Brick', en: 'Brick', zh: '带积木' }
        ];

        // 字典
        const i18nDict = {
            en: { 
                navTitle: "VORTEX", langBtn: "EN / 中文", visitors: "Live Visitors", legalTitle: "Legal Framework", 
                privacy: "Privacy Policy", terms: "Terms of Service", refund: "Refund Policy",
                coNameZh: "SHENZHEN RUHANG INTERNATIONAL HOUSEHOLD PRODUCTS CO., LTD.",
                coAddr: "Room 1303, No. 328 Xinmu Road, Shangmugu Community, Pinghu Street, Longgang District, Shenzhen",
                p_text: "We collect essential data to provide and improve our storage solutions.",
                t_text: "Accessing VortinT implies agreement with our operational guidelines.",
                r_text: "30-day satisfaction guarantee for all smart space products.",
                enquire: "ENQUIRE"
            },
            zh: { 
                navTitle: "VORTEX瑞航", langBtn: "中文 / EN", visitors: "实时访客", legalTitle: "法律合规", 
                privacy: "隐私政策", terms: "服务条款", refund: "退换货政策",
                coNameZh: "瑞航（深圳）国际家居用品有限公司",
                coAddr: "深圳市龙岗区平湖街道上木古社区新木路328号1303",
                p_text: "我们仅收集必要的交付数据以优化服务体验。",
                t_text: "访问 VortinT 瑞航即代表您同意我们的服务条款。",
                r_text: "所有产品均享受 30 天质保及售后服务。",
                enquire: "咨询"
            }
        };

        // 导航栏平滑隐藏逻辑
        let lastScrollY = window.scrollY;
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const nav = document.getElementById('navbar');
                    if (window.scrollY > lastScrollY && window.scrollY > 80) nav.classList.add('nav-hidden');
                    else nav.classList.remove('nav-hidden');
                    lastScrollY = window.scrollY;
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });

        // 语言切换
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            renderFilters();
            applyLang();
            renderGrid(getCurrentFilteredData()); // 刷新价格等字眼
        }

        function applyLang() {
            const dict = i18nDict[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(dict[key]) el.innerText = dict[key];
            });
            
            // 如果 legal 框正在显示，更新内容
            if(currentLegalId) toggleLegal(currentLegalId, true);
        }

        // 渲染过滤器按钮
        function renderFilters() {
            const container = document.getElementById('filter-container');
            container.innerHTML = categoryFilters.map(c => `
                <button onclick="handleFilterClick('${c.key}')" 
                        class="filter-btn whitespace-nowrap ${currentFilterKey === c.key ? 'active' : ''}">
                    ${c[currentLang]}
                </button>
            `).join('');
        }

        function handleFilterClick(key) {
            if (currentFilterKey === key) return;
            currentFilterKey = key;
            renderFilters(); // 更新激活状态

            const grid = document.getElementById('p-grid');
            grid.style.opacity = '0';
            grid.style.transform = 'translateY(10px)';

            setTimeout(() => {
                renderGrid(getCurrentFilteredData());
                grid.style.opacity = '1';
                grid.style.transform = 'translateY(0)';
            }, 300);
        }

        function getCurrentFilteredData() {
            const list = allProducts.filter(p => p.fields['标题'] && p.fields['标题'] !== 'SERVICE_LINK');
            if (currentFilterKey === 'all') return list;
            return list.filter(p => (p.fields['标题'] || "").toUpperCase().includes(currentFilterKey.toUpperCase()));
        }

        // 渲染商品网格
        function renderGrid(data) {
            const grid = document.getElementById('p-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (data.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            grid.innerHTML = data.map((p, index) => {
                const f = p.fields;
                const img = Array.isArray(f['图片']) ? f['图片'][0].url : (f['图片'] || '');
                const priceLabel = f['价格'] || i18nDict[currentLang].enquire;
                
                return `
                <div class="product-card bg-white p-3 md:p-4 rounded-[2rem] border border-blue-50 shadow-sm relative overflow-hidden group" 
                     style="animation-delay: ${index * 0.05}s"
                     onclick="window.open('${f['链接'] || '#'}', '_blank');">
                    <div class="product-index">${String(f['排序'] || 0).padStart(2, '0')}</div>
                    <div class="overflow-hidden rounded-[1.6rem] mb-3 bg-slate-50 aspect-square relative">
                        <img src="${img}" alt="${f['标题']}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" 
                             loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=400&q=80'">
                    </div>
                    <div class="px-1 flex justify-between items-center">
                        <!-- a11y: 为屏幕阅读器保留标题，视觉上隐藏以保持极简 -->
                        <h3 class="sr-only">${f['标题']}</h3>
                        <span class="text-blue-600 font-black text-[11px] tracking-tighter uppercase">${priceLabel}</span>
                        <div class="w-6 h-6 bg-blue-600 group-hover:bg-blue-700 transition-colors text-white rounded-full flex items-center justify-center shadow-md">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // 访客计数器
        function initCounter() {
            let count = parseInt(localStorage.getItem('v_count_stable')) || 15284;
            count += 1;
            localStorage.setItem('v_count_stable', count);
            const countEl = document.getElementById('visitor-count');
            countEl.innerText = count.toLocaleString();
            setInterval(() => {
                if(Math.random() > 0.6) {
                    count += Math.floor(Math.random() * 3) + 1;
                    countEl.innerText = count.toLocaleString();
                    localStorage.setItem('v_count_stable', count);
                }
            }, 8000);
        }

        // 法律条款手风琴逻辑
        let currentLegalId = null;
        function toggleLegal(id, forceRefresh = false) {
            const box = document.getElementById('legal-box');
            const dict = i18nDict[currentLang];
            
            // 映射内容
            const contentMap = {
                privacy: `<h6 class="font-black text-blue-900 mb-2">${dict.privacy}</h6><p>${dict.p_text}</p>`,
                terms: `<h6 class="font-black text-blue-900 mb-2">${dict.terms}</h6><p>${dict.t_text}</p>`,
                refund: `<h6 class="font-black text-blue-900 mb-2">${dict.refund}</h6><p>${dict.r_text}</p>`
            };

            if (currentLegalId === id && !forceRefresh) {
                // 关闭
                box.classList.remove('show');
                currentLegalId = null;
            } else {
                // 打开/切换
                box.innerHTML = contentMap[id];
                box.classList.add('show');
                currentLegalId = id;
                if (!forceRefresh) {
                    setTimeout(() => box.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
                }
            }
        }

        // 初始化
        async function init() {
            renderFilters();
            applyLang();
            initCounter();
            
            try {
                const res = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${CFG.SHEET}/records`, {
                    headers: { 'Authorization': `Bearer ${CFG.TOKEN}` }
                });
                const json = await res.json();
                
                if (json.success) {
                    allProducts = json.data.records.sort((a, b) => (a.fields['排序'] || 999) - (b.fields['排序'] || 999));
                    
                    // 视频处理
                    const vRow = allProducts.find(r => r.fields['视频链接']);
                    const player = document.getElementById('v-player');
                    if(vRow && vRow.fields['视频链接']) {
                        player.src = vRow.fields['视频链接'];
                        player.classList.remove('hidden');
                    }
                    
                    renderGrid(getCurrentFilteredData());
                } else {
                    throw new Error("API Error");
                }
            } catch (err) { 
                console.error("Sync Error:", err); 
                document.getElementById('empty-state').innerText = "CONNECTION FAILED";
                document.getElementById('empty-state').classList.remove('hidden');
            } finally {
                // 打字机效果
                new Typed('#typed', {
                    strings:['SMART STORAGE.', 'KIDS ROOM.', 'BY VORTINT™.'],
                    typeSpeed: 60, backSpeed: 40, loop: true
                });

                // 移除加载屏
                const splash = document.getElementById('splash');
                if(splash) { 
                    splash.style.opacity = '0'; 
                    setTimeout(() => splash.remove(), 700); 
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
