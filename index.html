<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | Smart Kids' Space & Creative Storage</title>
    <meta name="description" content="VortinT specializes in innovative children's furniture and elastic cord toy storage solutions.">
    
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .hover-lift { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hover-lift:hover { transform: translateY(-10px); }
        .hero-gradient { background: linear-gradient(to r, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
        <div class="flex justify-between items-center p-3 max-w-6xl mx-auto">
            <a href="#" class="flex items-center">
                <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" 
                     alt="VortinT Logo" 
                     class="h-10 md:h-12 w-auto object-contain"
                     loading="eager">
            </a>
            <div class="flex items-center space-x-5 text-xs font-semibold uppercase tracking-widest">
                <a href="#about" class="text-gray-400 hover:text-black transition">Concept</a>
                <a href="#store" class="text-gray-400 hover:text-black transition">Store</a>
                <a href="mailto:gd@vortexd.com" class="bg-black text-white px-4 py-1.5 rounded-full hover:bg-blue-600 transition">Contact</a>
            </div>
        </div>
    </nav>

    <header id="about" class="max-w-6xl mx-auto px-6 py-10 md:py-16 text-left">
        <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold leading-[0.9] tracking-tighter text-gray-900">
            Smart Space <br>
            <span class="hero-gradient">For Kids.</span>
        </h1>
        <p class="mt-5 text-lg md:text-xl text-gray-400 font-light italic">
            Focusing on <span id="typed" class="text-black font-semibold border-b-2 border-blue-500"></span>
        </p>
    </header>

    <section id="store" class="max-w-6xl mx-auto px-4 py-8 bg-slate-50 rounded-[2rem] md:rounded-[3rem] my-4 text-center shadow-inner">
        <div class="mb-10 flex flex-col md:flex-row md:items-center md:justify-between px-2 md:px-6 text-left">
            <div>
                <h2 class="text-2xl md:text-3xl font-black italic uppercase tracking-tighter text-gray-800">VortinT Collection</h2>
                <p class="text-gray-400 mt-1 uppercase tracking-[0.3em] text-[9px]">Amazon Official Storefront</p>
            </div>
            
            <a href="https://www.amazon.com/stores/VortinT/page/E975A681-5E23-424A-873D-51816883FE36" 
               target="_blank" 
               class="inline-block mt-4 md:mt-0 bg-[#FF9900] text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition-all shadow-md hover:shadow-orange-100 transform hover:-translate-y-0.5 active:scale-95 uppercase tracking-widest text-xs">
               🛒 Visit Official Store
            </a>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 px-2 md:px-6">
            </div>
    </section>

    <footer class="pt-16 pb-8 text-center">
        <p class="text-[10px] text-gray-400 uppercase tracking-[0.5em]">© 2026 VortinT Design Lab | All Rights Reserved</p>
        <div class="mt-5 inline-block bg-white px-5 py-1.5 rounded-full shadow-sm border border-gray-50">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">
                Total Visitors: <span id="busuanzi_value_site_pv" class="font-bold text-blue-600">...</span>
            </p>
        </div>
    </footer>

    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <script>
        // 1. 打字机动画
        new Typed('#typed', {
            strings: ['Plush toy storage.', 'Children\'s reading space.', 'Vertical elastic cord design.', 'Multi-functional storage.'],
            typeSpeed: 70, backSpeed: 40, loop: true
        });

        // 2. 数据维护
        const CLOUD_BASE = "https://res.cloudinary.com/dpr2pn5rs/image/upload/f_auto,q_auto/";

        const products = [
            {
                name: "Elastic Cord Storage - Classic",
                image: "https://m.media-amazon.com/images/I/81VOboTeuWL._SL1500_.jpg", 
                link: "https://www.amazon.com/dp/B0GK8D9HPR",
                tag: "Best Seller"
            },
            {
               {
    name: "VortinT Kids Storage 011A",
    image: "https://m.media-amazon.com/images/I/81LWYQTAqvL._AC_SY300_SX300_QL70_FMwebp_.jpg", 
    link: "https://www.amazon.com/dp/B0GFMDX8XG?maas=maas_adg_F685D581B08E0DAD455C2B5A2B13E79F_afap_abs&ref_=aa_maas&tag=maas&th=1",
    tag: "New"
},
            },
            {
                name: "Lifestyle & Aesthetic",
                image: "套图1.jpg", 
                link: "https://www.amazon.com/stores/VortinT",
                tag: "Inspire"
            }
        ];

        // 3. 渲染逻辑
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => {
                const fullImgUrl = p.image.startsWith('http') ? p.image : `${CLOUD_BASE}${p.image}`;
                return `
                <a href="${p.link}" target="_blank" class="group relative bg-white p-3 rounded-[1.8rem] shadow-sm hover:shadow-xl hover-lift transition-all duration-500 block">
                    ${p.tag ? `<span class="absolute top-6 left-6 z-10 bg-blue-600 text-white text-[9px] font-bold px-2.5 py-1 rounded-full shadow-md">${p.tag}</span>` : ''}
                    <div class="aspect-[4/5] overflow-hidden rounded-[1.3rem] bg-gray-100">
                        <img src="${fullImgUrl}" 
                             loading="lazy"
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
                             alt="${p.name}">
                    </div>
                    <div class="mt-5 mb-3 text-left px-1">
                        <h3 class="text-base font-extrabold text-gray-800 tracking-tight leading-tight">${p.name}</h3>
                        <div class="flex items-center mt-1.5 text-blue-600 font-bold text-[10px] uppercase tracking-widest">
                            Shop on Amazon
                            <svg class="w-3.5 h-3.5 ml-1.5 group-hover:translate-x-1.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </div>
                    </div>
                </a>
                `;
            }).join('');
        }
        renderProducts();
    </script>
</body>
</html>
