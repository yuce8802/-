<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VortinT | Furniture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+SC:wght@900&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background-color: #FAFAFA; }
        .hero-gradient { background: linear-gradient(to r, #2563eb, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="h-12 w-auto">
        <a href="mailto:contact@vortexd.com" class="text-xs font-bold tracking-widest text-gray-400 uppercase">Contact Us</a>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-16">
        <h1 class="text-6xl font-black tracking-tighter leading-none">Smart Space <br><span class="hero-gradient italic">For Kids.</span></h1>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="loading" class="text-gray-300 font-bold animate-pulse">LOADING...</div>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-12"></div>
    </main>

    <script>
        async function fetchProducts() {
            // 这是你的表格 ID
            const SHEET_ID = "1N58RVAfXQdnp2_5OqFTRFDq-5HTyPFYLYk53httoGVQ";
            const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

            try {
                const response = await fetch(URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1); 

                const grid = document.getElementById('product-grid');
                grid.innerHTML = rows.map(row => {
                    // 适配你截图的列：A(0)是名字, B(1)是图片, C(2)是链接
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!cols || cols.length < 2) return '';

                    const clean = (val) => val.replace(/^"|"$/g, '').trim();
                    const name = clean(cols[0]);
                    const img = clean(cols[1]);
                    const link = clean(cols[2] || '#');

                    if (!img.startsWith('http')) return '';

                    return `
                    <a href="${link}" target="_blank" class="group bg-white rounded-[2rem] p-4 shadow-sm hover:shadow-xl transition-all block">
                        <div class="aspect-square overflow-hidden rounded-[1.5rem] bg-gray-50 mb-6">
                            <img src="${img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                        </div>
                        <h3 class="text-xl font-black text-gray-900 px-2">${name}</h3>
                        <p class="mt-4 text-blue-600 font-bold text-[10px] uppercase tracking-widest px-2">Shop Now →</p>
                    </a>`;
                }).join('');
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = "Error loading data.";
            }
        }
        window.onload = fetchProducts;
    </script>
</body>
</html>
