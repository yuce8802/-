<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VortinT | Smart Space For Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+SC:wght@900&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            /* 💡 温馨配色：奶油色到浅肤色的微渐变 */
            background: linear-gradient(135deg, #FFFDF9 0%, #F7F3ED 100%); 
            font-family: 'Inter', 'Noto Sans SC', sans-serif; 
            min-height: 100vh;
        }

        /* 蓝色 3D 立体字 - 在浅色背景下做了阴影优化 */
        .glow-3d {
            color: #fff;
            background: linear-gradient(180deg, #60A5FA 0%, #2563EB 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 1px 0 #1D4ED8, 
                0 2px 0 #1E40AF, 
                0 3px 0 #1E3A8A, 
                0 10px 20px rgba(37,99,235,0.2);
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 温馨圆角卡片 */
        .product-card {
            background: #FFFFFF;
            border-radius: 2rem;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 30px rgba(183, 153, 123, 0.1); /* 采用棕色系阴影更温馨 */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(183, 153, 123, 0.15);
        }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: #2563EB; color: white; padding: 10px 24px; border-radius: 50px;
            font-weight: 900; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 9999;
        }
        #toast.show { opacity: 1; top: 50px; }
    </style>
</head>
<body>

    <div id="toast">EMAIL COPIED</div>

    <nav class="sticky top-0 z-50 p-6 flex justify-between items-center bg-white/50 backdrop-blur-md">
        <img src="https://res.cloudinary.com/dpr2pn5rs/image/upload/v1775785448/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260313164434_36_18_pwgssq.jpg" class="h-10 rounded-xl shadow-sm">
        <div class="flex space-x-2">
            <button onclick="toggleLang()" class="bg-black/5 px-4 py-2 rounded-full font-black text-[10px] uppercase">EN/中</button>
            <button onclick="copyEmail()" class="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-[10px] uppercase shadow-lg shadow-blue-500/30">Email</button>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto px-6 py-20 text-center md:text-left">
        <h1 class="text-7xl md:text-9xl font-black uppercase glow-3d leading-none mb-4">Smart Space</h1>
        <h1 class="text-4xl md:text-6xl font-black italic text-gray-800 mb-8">For Kids.</h1>
        <p class="text-xl md:text-2xl text-gray-400 font-bold">Focusing on <span id="typed" class="text-blue-600"></span></p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-32">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-10">
            <div id="loading" class="col-span-full text-center py-20 text-gray-300 font-black animate-pulse">CONNECTING TO VIKA...</div>
        </div>
    </main>

    <footer class="py-20 text-center border-t border-gray-100">
        <button onclick="copyEmail()" class="text-gray-300 font-black text-[10px] tracking-widest hover:text-blue-600 transition-colors uppercase">contact@vortexd.com</button>
    </footer>

    <script>
        const VIKA_TOKEN = "usk6WsQlH4X6ST2hQRk4vAz"; 
        const SHEET_ID = "dstUcVqARey53sJnMh";
        let currentLang = localStorage.getItem('vortint_lang') || 'en';
        let allProducts = [];

        async function fetchProducts() {
            try {
                const response = await fetch(`https://api.vika.cn/fusion/v1/datasheets/${SHEET_ID}/records`, {
                    headers: { 'Authorization': `Bearer ${VIKA_TOKEN}` }
                });
                const res = await response.json();
                if (res.success) {
                    allProducts = res.data.records;
                    if(document.getElementById('loading')) document.getElementById('loading').remove();
                    renderUI();
                }
            } catch (e) { console.error(e); }
        }

        function renderUI() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = allProducts.map(r => {
                const f = r.fields;
                let img = f['图片'] || "";
                if (Array.isArray(img)) img = img[0].url;
                img = img.replace("http://", "https://");

                return `
                <a href="${f['链接'] || '#'}" target="_blank" class="product-card p-4 block group">
                    <img src="${img}" class="w-full aspect-square object-cover rounded-[1.5rem] mb-4 bg-gray-50" onerror="this.src='https://placehold.co/400x400?text=VortinT'">
                    <h3 class="text-gray-900 text-[11px] font-black line-clamp-2 h-10 mb-2 leading-tight">${f['标题'] || 'Item'}</h3>
                    <div class="text-blue-600 text-[9px] font-black uppercase tracking-widest">Explore →</div>
                </a>`;
            }).join('');
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('vortint_lang', currentLang);
            location.reload();
        }

        function copyEmail() {
            navigator.clipboard.writeText("contact@vortexd.com").then(() => {
                const t = document.getElementById('toast');
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            });
        }

        window.onload = () => {
            fetchProducts();
            new Typed('#typed', { 
                strings: currentLang === 'en' ? ['Plush Toy Storage.', 'Reading Spaces.', 'Tidy Habits.'] : ['毛绒玩具收纳.', '阅读空间打造.', '好习惯养成.'], 
                typeSpeed: 50, loop: true 
            });
        };
    </script>
</body>
</html>
